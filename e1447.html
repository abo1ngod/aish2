<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيدية عائلة أبو أنس</title>
    
    <!-- خطوط جوجل العصرية والأنيقة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- مكتبة Tailwind CSS للتصميم السريع والمتجاوب -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --primary: #0f2027;
            --secondary: #203a43;
            --accent: #2c5364;
            --gold: #f6d365;
            --gold-light: #fda085;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            color: white;
            margin: 0;
            overflow: hidden; /* لمنع ظهور أشرطة التمرير بسبب القصاصات */
            min-height: 100vh;
        }

        .font-kufi {
            font-family: 'Reem Kufi', sans-serif;
        }

        /* تأثير الزجاج العصري للبطاقة */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* حركات الانيميشن */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .floating-element {
            animation: float 4s ease-in-out infinite;
        }

        /* تأثير النبض البسيط للعداد */
        @keyframes soft-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(0.98); }
        }
        
        .pulse-timer {
            animation: soft-pulse 2s infinite;
        }

        /* تدرج لوني ذهبي للنصوص البارزة */
        .text-gradient-gold {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* قماش (Canvas) القصاصات */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- قماش (Canvas) لتساقط القصاصات -->
    <canvas id="confetti-canvas"></canvas>

    <!-- المحتوى الرئيسي - متوافق مع الشاشات الطولية (الجوالات) -->
    <main class="content-wrapper w-full max-w-sm glass-card rounded-3xl p-8 text-center floating-element">
        
        <!-- التهنية الرئيسية -->
        <h1 class="font-kufi text-4xl md:text-5xl font-bold text-gradient-gold mb-3 drop-shadow-lg">
            كل عام وأنتم بخير
        </h1>
        <p class="text-lg md:text-xl text-gray-200 mb-8 font-semibold">
            تقبل الله منا ومنكم صالح الأعمال
        </p>

        <!-- القسم الخاص بالعائلة -->
        <div class="my-6 py-6 border-y border-white/10 relative">
            <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-[#203a43] px-3 text-sm text-yellow-400 rounded-full border border-white/10">
                مفاجأة العيد
            </div>
            <p class="text-xl mb-1 text-gray-100">انتظروا عيدية</p>
            <p class="font-kufi text-2xl text-yellow-300 mt-2">عائلة</p>
            <p class="font-kufi text-5xl md:text-6xl font-bold text-gradient-gold mt-2 drop-shadow-xl">أبو أنس</p>
        </div>

        <!-- تفاصيل الموعد -->
        <div class="mb-6">
            <p class="text-md text-gray-300">يفتح الموقع يوم العيد</p>
            <p class="text-lg font-bold text-yellow-400 mt-1">الساعة 8:00 صباحاً</p>
        </div>

        <!-- العداد التنازلي -->
        <div class="bg-black/20 rounded-2xl p-4 mb-6 pulse-timer border border-white/5">
            <p class="text-sm text-gray-400 mb-3">بقي عن الافتتاح ...</p>
            
            <div class="flex justify-center items-center gap-3 md:gap-4" dir="ltr">
                <!-- الساعات -->
                <div class="flex flex-col items-center">
                    <div class="bg-white/10 w-16 h-16 rounded-xl flex items-center justify-center backdrop-blur-sm border border-white/10 shadow-inner">
                        <span id="hours" class="text-3xl font-bold text-white font-mono">00</span>
                    </div>
                    <span class="text-xs text-gray-400 mt-2">ساعة</span>
                </div>
                
                <span class="text-2xl font-bold text-yellow-400 pb-6">:</span>
                
                <!-- الدقائق -->
                <div class="flex flex-col items-center">
                    <div class="bg-white/10 w-16 h-16 rounded-xl flex items-center justify-center backdrop-blur-sm border border-white/10 shadow-inner">
                        <span id="minutes" class="text-3xl font-bold text-white font-mono">00</span>
                    </div>
                    <span class="text-xs text-gray-400 mt-2">دقيقة</span>
                </div>

                <span class="text-2xl font-bold text-yellow-400 pb-6">:</span>
                
                <!-- الثواني -->
                <div class="flex flex-col items-center">
                    <div class="bg-white/10 w-16 h-16 rounded-xl flex items-center justify-center backdrop-blur-sm border border-white/10 shadow-inner">
                        <span id="seconds" class="text-3xl font-bold text-yellow-400 font-mono">00</span>
                    </div>
                    <span class="text-xs text-gray-400 mt-2">ثانية</span>
                </div>
            </div>
            <!-- رسالة عند انتهاء العداد -->
            <div id="opened-message" class="hidden mt-4 font-kufi text-2xl text-green-400 font-bold">
                تم الافتتاح! مرحباً بكم
            </div>
        </div>

        <!-- الخاتمة -->
        <p class="font-kufi text-2xl font-bold text-gradient-gold">دامت أفراحكم</p>
    </main>

    <!-- سكريبت العداد التنازلي والقصاصات -->
    <script>
        // --- إعدادات العداد التنازلي ---
        // تم التعديل إلى 20 مارس 2026 الساعة 8 صباحاً
        // النسق: Month DD, YYYY HH:MM:SS
        const countDownDate = new Date("March 20, 2026 08:00:00").getTime();

        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            // الحسابات الزمنية
            // نستخدم الساعات الإجمالية (بما في ذلك الأيام محولة إلى ساعات) ليناسب طلبك
            const hours = Math.floor(distance / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // إضافة صفر في البداية إذا كان الرقم أقل من 10
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // إذا انتهى الوقت
            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                
                // إظهار رسالة الافتتاح
                document.getElementById("opened-message").classList.remove("hidden");
            }
        }, 1000);


        // --- إعدادات تساقط القصاصات (Confetti) باستمرار ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#ffffff', '#bf953f'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 8 + 4;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.speedY = Math.random() * 2 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 5 - 2.5;
                // تحديد شكل: 0 دائرة، 1 مستطيل
                this.shape = Math.random() > 0.5 ? 'circle' : 'rect';
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;

                // إعادة تدوير القصاصة من الأعلى إذا خرجت من الشاشة
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
                
                // حركة أفقية بسيطة (تأرجح)
                this.x += Math.sin(this.y * 0.01) * 0.5;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.8;

                if (this.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size * 0.6);
                }

                ctx.restore();
            }
        }

        // إنشاء القصاصات
        function initConfetti() {
            // تقليل العدد للأجهزة المحمولة لتحسين الأداء
            const particleCount = window.innerWidth < 768 ? 60 : 120;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // حلقة الرسم
        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateConfetti);
        }

        // تحديث أبعاد الـ Canvas عند تغيير حجم الشاشة
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        initConfetti();
        animateConfetti();
    </script>
</body>
</html>
