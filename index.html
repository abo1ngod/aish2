<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>المنصة التعليمية - الطالب</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dark.css" id="dark-css" disabled>
<!-- Font & icons -->
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<header class="site-header">
  <div class="container">
    <h1>المنصة التعليمية - الدراسات الإسلامية</h1>
    <div class="header-controls">
      <button id="themeToggle" class="btn small">🌙</button>
      <a href="admin.html" class="btn small outline">لوحة المعلم</a>
    </div>
  </div>
</header>

<main class="container">
  <section id="auth" class="card">
    <h2>بوابة الطلاب</h2>
    <div id="auth-forms">
      <div id="login">
        <input id="login-username" placeholder="اسم المستخدم">
        <input id="login-password" type="password" placeholder="كلمة المرور">
        <button id="login-btn" class="btn">دخول</button>
        <p>ليس لديك حساب؟ <a href="#" id="show-register">سجل جديد</a></p>
      </div>
      <div id="register" style="display:none;">
        <input id="reg-username" placeholder="اسم المستخدم">
        <input id="reg-password" type="password" placeholder="كلمة المرور">
        <input id="reg-name" placeholder="الاسم الثلاثي">
        <input id="reg-section" placeholder="الشعبة">
        <button id="register-btn" class="btn primary">إنشاء حساب</button>
        <p>لديك حساب؟ <a href="#" id="show-login">تسجيل دخول</a></p>
      </div>
    </div>
  </section>

  <section id="dashboard" class="card" style="display:none;">
    <div class="dash-header">
      <h2>فهرس الدروس</h2>
      <div>
        <span id="student-name"></span>
        <button id="logout" class="btn outline">خروج</button>
      </div>
    </div>
    <input id="search-lesson" placeholder="بحث داخل الدروس..." class="search">
    <div id="lessons-grid" class="lesson-grid"></div>
  </section>

  <section id="lesson-view" class="card" style="display:none;">
    <div class="lesson-top">
      <h2 id="lesson-title"></h2>
      <div id="timer" class="timer" style="display:none;">00:00</div>
    </div>
    <div id="lesson-content" class="lesson-content"></div>
    <div id="lesson-actions" style="margin-top:15px;">
      <button id="start-quiz" class="btn primary">ابدأ الاختبار</button>
      <button id="back-to-dash" class="btn outline">العودة للفهرس</button>
    </div>
  </section>

  <section id="quiz-view" class="card" style="display:none;">
    <h2 id="quiz-title"></h2>
    <div id="quiz-questions"></div>
    <div class="quiz-footer">
      <div id="progress-text"></div>
      <button id="submit-quiz" class="btn primary">تسليم الإجابات</button>
    </div>
  </section>

  <section id="badges-view" class="card" style="display:none;">
    <h2>شاراتي</h2>
    <div id="badges-container" class="badges"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">جميع الحقوق محفوظة © 2025</div>
</footer>

<script src="js/lessons.js"></script>
<script src="js/badges.js"></script>
<script src="js/app.js"></script>
</body>
</html>
