<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التركيز الصوتي</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --focus-color: #27ae60; /* لون التركيز الأخضر */
            --highlight: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- واجهة العرض للجمهور --- */
        #display-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px;
        }

        h1.main-title {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 100%;
            padding-bottom: 40px;
        }

        .display-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            min-width: 240px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 4px solid transparent; /* حدود شفافة للتحضير */
            cursor: pointer; /* مؤشر اليد */
            transition: all 0.3s ease;
            position: relative;
        }

        /* الحالة العادية (عند المرور) */
        .display-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
        }

        /* --- حالة التركيز (Active Focus) --- */
        .display-card.focused {
            border-color: var(--focus-color);
            background-color: #e8f8f5;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(39, 174, 96, 0.4);
            z-index: 10;
        }

        /* أيقونة الميكروفون داخل الكارت */
        .mic-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .display-card.focused .mic-icon {
            opacity: 1;
            animation: pulse-mic 1.5s infinite;
        }

        /* --- حالة عدم النشاط (بقية الكروت) --- */
        .display-card.dimmed {
            opacity: 0.5;
            transform: scale(0.95);
            filter: grayscale(80%);
            pointer-events: none; /* منع النقر على الكروت الباهتة */
        }

        @keyframes pulse-mic {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .display-card .name {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
            pointer-events: none; /* لضمان أن النقر يذهب للكارت */
        }

        .display-card .count {
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            pointer-events: none;
        }
        
        .hint-text {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        /* --- الفوتر --- */
        .footer-bar {
            background: #dfe6e9;
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #636e72;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 20px;
            padding-right: 20px;
            z-index: 20;
        }
        .admin-trigger { cursor: pointer; opacity: 0.6; padding: 5px; }
        .admin-trigger:hover { opacity: 1; color: var(--highlight); }

        /* --- لوحة الإدارة (نفس السابق) --- */
        #admin-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
        }
        .panel-content {
            background: white; width: 90%; max-width: 600px; border-radius: 10px; padding: 25px;
            max-height: 85vh; overflow-y: auto; position: relative;
        }
        .close-panel {
            position: absolute; top: 15px; left: 15px; font-size: 1.5rem; cursor: pointer;
            background: none; border: none; color: #7f8c8d; padding: 10px;
        }
        .panel-section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 2px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: var(--highlight); color: white; }
        .btn-success { background: var(--focus-color); color: white; }
        .btn-warning { background: #f1c40f; color: #333; }
        input[type="text"] { padding: 8px; border: 1px solid #ddd; width: 65%; font-size: 1rem; }
    </style>
</head>
<body>

    <!-- واجهة العرض -->
    <div id="display-view">
        <h1 class="main-title">المسابقة التفاعلية</h1>
        <p class="hint-text">اضغط على اسم المتسابق لبدء الاستماع له حصرياً</p>
        
        <div class="cards-grid" id="public-cards">
            <!-- البطاقات تظهر هنا -->
        </div>
    </div>

    <!-- الفوتر -->
    <div class="footer-bar">
        <span id="listening-indicator">🔴 اختر متسابقاً للبدء</span>
        <span class="admin-trigger" onclick="openAdmin()">🔒 الإدارة</span>
    </div>

    <!-- لوحة التحكم -->
    <div id="admin-panel">
        <div class="panel-content">
            <button class="close-panel" onclick="closeAdmin()">✖</button>
            <h2>⚙️ الإدارة</h2>
            
            <div class="panel-section" style="background: #e8f6f3; padding: 15px;">
                <h3>حالة النظام</h3>
                <div id="admin-mic-status">الميكروفون يعمل تلقائياً عند اختيار اسم.</div>
                <div style="margin-top:10px; color:#7f8c8d;">آخر جملة: <span id="last-heard" style="color:#d35400;">-</span></div>
            </div>

            <div class="panel-section">
                <h3>إضافة جديد</h3>
                <input type="text" id="new-name" placeholder="الاسم...">
                <button class="btn btn-primary" onclick="addPerson()">إضافة</button>
            </div>

            <div class="panel-section">
                <table id="admin-table">
                    <thead><tr><th>الاسم</th><th>العدد</th><th>تحكم</th></tr></thead>
                    <tbody></tbody>
                </table>
                <br>
                <button class="btn btn-warning" onclick="resetAllCounts()" style="width:100%">تصفير الكل</button>
            </div>
        </div>
    </div>

    <script>
        // --- البيانات ---
        let people = [];
        let activeTargetId = null; // المتغير الذي يحدد من يتم الاستماع إليه حالياً

        function loadData() {
            const saved = localStorage.getItem('voiceDataFocus');
            people = saved ? JSON.parse(saved) : [
                { id: 1, name: 'أحمد', count: 0 },
                { id: 2, name: 'محمد', count: 0 },
                { id: 3, name: 'سعيد', count: 0 }
            ];
            renderAll();
        }

        function saveData() {
            localStorage.setItem('voiceDataFocus', JSON.stringify(people));
            renderAll();
        }

        // --- الرسم (Render) ---
        function renderAll() {
            renderPublicCards();
            renderAdminTable();
        }

        function renderPublicCards() {
            const container = document.getElementById('public-cards');
            container.innerHTML = '';
            
            people.forEach(p => {
                // تحديد الكلاسات بناءً على حالة التركيز
                let cardClass = 'display-card';
                if (activeTargetId !== null) {
                    if (p.id === activeTargetId) {
                        cardClass += ' focused';
                    } else {
                        cardClass += ' dimmed';
                    }
                }

                container.innerHTML += `
                    <div class="${cardClass}" id="card-${p.id}" onclick="toggleFocus(${p.id})">
                        <div class="mic-icon">🎙️</div>
                        <div class="name">${p.name}</div>
                        <div class="count">${p.count}</div>
                    </div>
                `;
            });
        }

        function renderAdminTable() {
            const tbody = document.querySelector('#admin-table tbody');
            tbody.innerHTML = '';
            people.forEach((p, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td><input type="text" value="${p.name}" onchange="updateName(${index}, this.value)" style="width:70px"></td>
                        <td><strong>${p.count}</strong></td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteOne(${index})">حذف</button>
                        </td>
                    </tr>
                `;
            });
        }

        // --- منطق التركيز (Focus Logic) ---
        function toggleFocus(id) {
            if (activeTargetId === id) {
                // إذا ضغط على نفس الشخص، نلغي التحديد
                activeTargetId = null;
                stopListening(); // نوقف المايك عند إلغاء التحديد
                updateStatusUI(false, "تم إيقاف الاختيار");
            } else {
                // تحديد شخص جديد
                activeTargetId = id;
                startListening(); // نشغل المايك فوراً
                const person = people.find(p => p.id === id);
                updateStatusUI(true, `جاري الاستماع لـ: ${person.name}`);
            }
            renderPublicCards(); // إعادة رسم لتحديث الألوان
        }

        // --- التحكم بالبيانات ---
        function addPerson() {
            const name = document.getElementById('new-name').value.trim();
            if(name) {
                people.push({id: Date.now(), name: name, count: 0});
                document.getElementById('new-name').value = '';
                saveData();
            }
        }
        function updateName(idx, val) { if(val) { people[idx].name = val; saveData(); } }
        function deleteOne(idx) { if(confirm('حذف؟')) { people.splice(idx,1); saveData(); } }
        function resetAllCounts() { if(confirm('تصفير؟')) { people.forEach(p=>p.count=0); saveData(); } }

        // --- الصوت (Speech) ---
        let recognition;
        let isRunning = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = function() { isRunning = true; };
            recognition.onend = function() {
                // إذا كان هناك شخص محدد، نعيد تشغيل المايك
                if (activeTargetId !== null) {
                    recognition.start();
                } else {
                    isRunning = false;
                }
            };
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.trim();
                document.getElementById('last-heard').innerText = transcript;
                processSpeech(transcript);
            };
        }

        function startListening() {
            if (recognition && !isRunning) {
                try { recognition.start(); } catch(e) {}
            }
        }

        function stopListening() {
            if (recognition) {
                recognition.stop();
                isRunning = false;
            }
        }

        function processSpeech(text) {
            // إذا لم يكن هناك أحد مختار، لا نفعل شيئاً
            if (activeTargetId === null) return;

            // البحث عن الشخص المحدد فقط
            const targetPerson = people.find(p => p.id === activeTargetId);
            
            if (targetPerson && text.includes(targetPerson.name)) {
                targetPerson.count++;
                saveData(); // سيقوم الـ Save بإعادة الرسم وتحديث الرقم
                
                // وميض إضافي للتأكيد
                const card = document.getElementById(`card-${activeTargetId}`);
                card.style.borderColor = "#e67e22"; // برتقالي للحظة
                setTimeout(() => card.style.borderColor = "#27ae60", 300);
            }
        }

        function updateStatusUI(active, text) {
            const indicator = document.getElementById('listening-indicator');
            indicator.innerText = active ? "🟢 " + text : "🔴 " + text;
            indicator.style.color = active ? "#27ae60" : "#636e72";
        }

        // --- إدارة النوافذ ---
        function openAdmin() {
            if(prompt("كلمة المرور (1234)") === "1234") document.getElementById('admin-panel').style.display = 'flex';
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        loadData();
    </script>
</body>
</html>
