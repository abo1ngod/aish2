        const LessonView = ({ lesson, user, onComplete, onBack, mode }) => {
            if (!lesson) return <div className="p-8 text-center">الدرس غير موجود<br/><button onClick={onBack}>عودة</button></div>;
            const [answers, setAnswers] = useState({});
            const [result, setResult] = useState(null);
            const [randomizedQuestions, setRandomizedQuestions] = useState([]);
            const isReview = mode === 'review';
            
            useEffect(() => {
                window.scrollTo(0, 0);
                if(lesson && lesson.questions) {
                    const qs = [...lesson.questions];
                    const shuffledQs = shuffleArray(qs).map(q => {
                        if(q.type === 'mcq') {
                             return { ...q, options: shuffleArray([...q.options]) };
                        }
                        return q;
                    });
                    setRandomizedQuestions(shuffledQs);
                }
            }, [lesson, mode]);

            let reviewScore = 0;
            if (isReview && user.role === 'student' && user.history) {
                 const historyItems = user.history.filter(h => h.lessonId === lesson.id);
                 if (historyItems.length > 0) {
                     reviewScore = Math.max(...historyItems.map(h => h.score));
                 }
            }

            const submit = () => {
                if(user.role === 'guest') return alert("عذراً، الزوار لا يمكنهم تسليم الإجابات.");
                if(isReview) return; 
                let correct = 0; let mistakes = [];
                randomizedQuestions.forEach(q => { 
                    const userAns = String(answers[q.id]).trim().toLowerCase();
                    const correctAns = String(q.answer).trim().toLowerCase();
                    if(userAns === correctAns) correct++; else mistakes.push(q); 
                });
                const score = Math.round((correct/randomizedQuestions.length)*100);
                const passed = score >= 50;
                setResult({score, mistakes, passed});
                onComplete(lesson.id, score, mistakes, passed);
                if(passed) confetti();
            };

            return (
                <div className="max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow-xl fade-in">
                    {isReview && (
                        <div className="bg-green-50 text-green-800 p-4 rounded-xl mb-6 text-center border border-green-200 shadow-sm">
                            <div className="font-bold text-lg mb-1">🎉 رائع جداً! لقد أتممت هذا الدرس.</div>
                            <div className="text-sm">وضع المراجعة • نتيجتك السابقة: <span className="font-bold text-xl">{reviewScore}%</span></div>
                        </div>
                    )}
                    
                    {!result ? (
                        <>
                            <div className="border-b pb-6 mb-6"><button onClick={onBack} className="text-slate-400 font-bold mb-4 block hover:text-slate-600 transition"><i className="fas fa-arrow-right ml-1"></i> عودة للدروس</button><h2 className="text-3xl font-extrabold mb-4 text-slate-800">{lesson.title}</h2><div className="bg-slate-50 p-6 rounded-2xl text-lg text-slate-700 leading-loose border border-slate-100">{lesson.content}</div></div>
                            <div className="space-y-8 mb-10">
                                {randomizedQuestions.map((q, i) => (
                                    <div key={q.id} className="p-6 border rounded-2xl hover:border-blue-200 transition bg-white shadow-sm">
                                        <div className="flex flex-col gap-3 mb-4"><div className="flex justify-between items-center w-full"><span className="bg-blue-100 text-primary text-sm px-3 py-1 rounded-full font-bold">سؤال {i+1}</span><span className="text-xs text-slate-400 font-bold uppercase tracking-wider">{q.type === 'tf' ? 'صح/خطأ' : 'اختيار'}</span></div><p className="font-bold text-xl text-slate-800 leading-relaxed break-words whitespace-normal">{q.text}</p></div>
                                        {q.type === 'mcq' && q.options.map(opt => {
                                            const isCorrect = String(opt).toLowerCase() === String(q.answer).toLowerCase();
                                            return (
                                                <label key={opt} className={`flex items-start gap-3 p-4 border rounded-xl mb-2 cursor-pointer transition w-full ${isReview && isCorrect ? 'bg-green-100 border-green-500' : ''} ${!isReview && answers[q.id]===opt ? 'bg-blue-50 border-primary' : 'hover:bg-slate-50'}`}>
                                                    <input type="radio" name={q.id} className="mt-1.5 w-5 h-5 text-primary shrink-0 accent-primary" onChange={()=>setAnswers({...answers, [q.id]:opt})} disabled={user.role==='guest' || isReview} checked={isReview ? isCorrect : undefined} />
                                                    <span className="text-slate-700 font-medium break-words w-full text-lg">{opt} {isReview && isCorrect && "✅"}</span>
                                                </label>
                                            );
                                        })}
                                        {q.type === 'tf' && (<div className="flex gap-4"><button onClick={()=>setAnswers({...answers, [q.id]:'true'})} disabled={user.role==='guest' || isReview} className={`flex-1 p-4 rounded-xl border font-bold text-lg transition ${isReview && String(q.answer)==='true' ? 'bg-green-100 border-green-500 text-green-700' : ''} ${!isReview && answers[q.id]==='true' ? 'bg-green-100 text-green-700 border-green-500' : 'hover:bg-slate-50'}`}>صح</button><button onClick={()=>setAnswers({...answers, [q.id]:'false'})} disabled={user.role==='guest' || isReview} className={`flex-1 p-4 rounded-xl border font-bold text-lg transition ${isReview && String(q.answer)==='false' ? 'bg-green-100 border-green-500 text-green-700' : ''} ${!isReview && answers[q.id]==='false' ? 'bg-red-100 text-red-700 border-red-500' : 'hover:bg-slate-50'}`}>خطأ</button></div>)}
                                        {isReview && <p className="text-sm text-slate-600 mt-2 bg-slate-50 p-3 rounded border-r-4 border-yellow-400">💡 {q.explanation}</p>}
                                    </div>
                                ))}
                            </div>
                            {!isReview && (user.role !== 'guest' ? <button onClick={submit} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-xl hover:shadow-xl transition">تسليم الإجابات</button> : <div className="text-center text-slate-500 bg-slate-100 p-4 rounded-xl">وضع الزائر</div>)}
                        </>
                    ) : (
                        <div className="text-center py-12 flex flex-col items-center">
                            {result.passed ? (
                                <div className="animate-bounce mb-6 text-6xl">🎉</div>
                            ) : (
                                <div className="mb-6 text-6xl text-slate-300"><i className="fas fa-running"></i></div>
                            )}
                            
                            <h2 className="text-4xl font-extrabold mb-2 text-slate-800">{result.passed ? 'أحسنت يا بطل!' : 'حاول مرة أخرى!'}</h2>
                            <h3 className={`text-6xl font-black mb-6 ${result.passed ? 'text-green-500' : 'text-red-500'}`}>{result.score}%</h3>
                            
                            <p className="text-xl text-slate-500 mb-8 max-w-md leading-relaxed">
                                {result.passed 
                                    ? 'لقد أثبت جدارتك واجتزت هذا الدرس بنجاح. استمر في التقدم!' 
                                    : 'لا تيأس، الفشل هو الخطوة الأولى نحو النجاح. راجع المحتوى وحاول مجدداً لتحقيق نسبة 50% أو أعلى.'}
                            </p>
                            
                            <button onClick={onBack} className={`px-12 py-4 rounded-2xl font-bold text-white shadow-xl hover:scale-105 transition ${result.passed ? 'bg-green-600' : 'bg-slate-800'}`}>
                                {result.passed ? 'العودة للقائمة' : 'إعادة المحاولة'}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const FlashcardsView = ({ lesson, onBack }) => {
            if (!lesson) return <div className="p-8 text-center">الدرس غير موجود<br/><button onClick={onBack}>عودة</button></div>;
            const [index, setIndex] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const cards = lesson.flashcards || [];
            if(cards.length===0) return <div className="text-center p-20"><p>لا توجد بطاقات.</p><button onClick={onBack} className="mt-4 text-primary font-bold">عودة</button></div>;
            return (
                <div className="max-w-md mx-auto fade-in text-center pt-10">
                    <button onClick={onBack} className="mb-6 text-slate-400 font-bold hover:text-slate-600"> عودة</button>
                    <div className="h-72 w-full cursor-pointer perspective-1000 mb-10" onClick={() => setFlipped(!flipped)}>
                        <div className={`flip-card w-full h-full ${flipped ? 'flipped' : ''}`}>
                            <div className="flip-card-inner shadow-2xl rounded-3xl">
                                <div className="flip-card-front text-3xl font-bold text-slate-800"><p>{cards[index].front}</p><span className="text-xs text-slate-400 mt-4">(اقلب)</span></div>
                                <div className="flip-card-back text-2xl font-medium px-6"><p>{cards[index].back}</p></div>
                            </div>
                        </div>
                    </div>
                    <div className="flex justify-between items-center px-8"><button onClick={() => {setFlipped(false); setIndex(Math.max(0, index-1))}} disabled={index===0} className="p-5 bg-white rounded-full shadow-lg disabled:opacity-50"><i className="fas fa-arrow-right"></i></button><span className="font-bold text-slate-400">{index+1} / {cards.length}</span><button onClick={() => {setFlipped(false); setIndex(Math.min(cards.length-1, index+1))}} disabled={index===cards.length-1} className="p-5 bg-white rounded-full shadow-lg disabled:opacity-50"><i className="fas fa-arrow-left"></i></button></div>
                </div>
            );
        };

        const SRSView = ({ user, onReview, onBack }) => {
            const due = user.srsQueue?.filter(q => q.nextReview <= Date.now()) || [];
            const [curr, setCurr] = useState(0);
            const [show, setShow] = useState(false);
            if(due.length === 0) return <div className="text-center py-24 bg-white rounded-3xl shadow-sm"><h2 className="text-2xl font-bold">لا توجد مراجعات</h2><button onClick={onBack} className="mt-4 bg-slate-800 text-white px-6 py-2 rounded-xl">عودة</button></div>;
            const q = due[curr];
            return (
                <div className="max-w-xl mx-auto bg-white p-10 rounded-3xl shadow-xl text-center fade-in">
                    <h2 className="text-2xl font-bold mb-12 text-slate-800 break-words leading-loose whitespace-normal">{q.text}</h2>
                    {!show ? <button onClick={() => setShow(true)} className="bg-blue-50 text-primary px-12 py-4 rounded-2xl font-bold">إظهار الإجابة</button> : <div className="fade-in"><p className="text-xl font-bold text-green-600 mb-6 break-words">{q.answer}</p><div className="grid grid-cols-2 gap-4"><button onClick={() => { onReview(q, false); setCurr(0); setShow(false); }} className="bg-red-50 text-red-600 py-4 rounded-2xl font-bold">نسيت</button><button onClick={() => { onReview(q, true); setCurr(0); setShow(false); }} className="bg-green-50 text-green-600 py-4 rounded-2xl font-bold">تذكرت</button></div></div>}
                </div>
            );
        };

        const MistakeVault = ({ user, onSolve, onBack }) => {
            const m = user.mistakes?.[0];
            return (
                <div className="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-lg text-center fade-in">
                    <button onClick={onBack} className="mb-4 text-slate-400 font-bold">عودة</button>
                    <h2 className="text-2xl font-bold mb-8 text-red-600">بنك الأخطاء</h2>
                    {!m ? <p className="text-slate-500 font-bold">سجلك نظيف!</p> : <div><div className="bg-slate-50 p-8 rounded-2xl mb-6 w-full text-right"><p className="font-bold text-xl text-slate-800 leading-loose break-words whitespace-normal">{m.text}</p></div><button onClick={() => onSolve(m.id)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">لقد فهمتها</button><div className="mt-4 bg-yellow-50 p-4 rounded text-sm text-right break-words">{m.explanation}</div></div>}
                </div>
            );
        };

        const Certificate = ({ user, onBack }) => {
            const saveAsImage = async () => {
                const element = document.getElementById('certificate-area');
                try {
                    const canvas = await html2canvas(element, { scale: 2, useCORS: true });
                    const link = document.createElement('a');
                    link.download = `Certificate_${user.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    confetti();
                } catch (err) { alert("حدث خطأ أثناء الحفظ"); }
            };

            return (
                <div className="max-w-xl mx-auto fade-in text-center pt-5 pb-10">
                    <div className="flex justify-between items-center mb-6 px-4">
                        <button onClick={onBack} className="text-slate-500 font-bold">عودة</button>
                        <button onClick={saveAsImage} className="bg-slate-900 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:scale-105 transition text-sm"><i className="fas fa-download mr-2"></i> حفظ كصورة</button>
                    </div>
                    {/* Portrait Certificate Container */}
                    <div id="certificate-area" className="bg-white relative overflow-hidden text-center shadow-2xl mx-auto cert-pattern" 
                         style={{ width: '100%', maxWidth: '400px', aspectRatio: '1/1.414', padding: '2rem' }}>
                        
                        <div className="absolute inset-2 border-[6px] border-double border-slate-800 rounded-sm pointer-events-none"></div>
                        <div className="absolute inset-4 border-[1px] border-gold rounded-sm pointer-events-none"></div>
                        
                        <div className="absolute top-4 left-4 text-gold text-2xl"><i className="fas fa-certificate"></i></div>
                        <div className="absolute top-4 right-4 text-gold text-2xl"><i className="fas fa-certificate"></i></div>
                        <div className="absolute bottom-4 left-4 text-gold text-2xl"><i className="fas fa-certificate"></i></div>
                        <div className="absolute bottom-4 right-4 text-gold text-2xl"><i className="fas fa-certificate"></i></div>

                        <div className="h-full flex flex-col justify-between items-center relative z-10 py-8">
                            <div>
                                <div className="w-16 h-16 bg-slate-900 text-white rounded-full flex items-center justify-center text-2xl font-bold shadow-lg mx-auto mb-4"><i className="fas fa-graduation-cap"></i></div>
                                <h1 className="text-3xl font-extrabold text-slate-800 mb-2" style={{fontFamily: 'Amiri'}}>شهادة شكر وتقدير</h1>
                                <p className="text-sm text-slate-500">منصة التفسير للتعليم الذكي</p>
                            </div>

                            <div className="w-full">
                                <p className="text-base text-slate-600 mb-4">تتشرف الإدارة بمنح هذه الشهادة للطالب:</p>
                                <h2 className="text-2xl font-extrabold text-primary border-b-2 border-gold inline-block pb-2 px-4 mb-6" style={{fontFamily: 'Amiri'}}>{user.name}</h2>
                                <p className="text-base text-slate-700 leading-relaxed px-2">
                                    وذلك لاجتيازه بنجاح وتفوق متطلبات المستوى<br/>
                                    <span className="font-bold text-xl text-slate-900 mt-2 block">{getLevelName(user.level)}</span>
                                </p>
                            </div>

                            <div className="w-full mt-4">
                                <div className="w-20 h-20 bg-gold rounded-full opacity-10 flex items-center justify-center mx-auto mb-2">
                                    <i className="fas fa-star text-4xl text-yellow-600"></i>
                                </div>
                                <div className="flex justify-around items-end w-full px-4">
                                    <div className="text-center">
                                        <p className="text-xs text-slate-400 mb-1">التاريخ</p>
                                        <p className="font-bold text-sm">{new Date().toLocaleDateString('ar-SA')}</p>
                                    </div>
                                    <div className="text-center">
                                        <div className="w-16 h-px bg-slate-800 mb-2 mx-auto"></div>
                                        <p className="font-bold text-sm text-slate-800" style={{fontFamily: 'Amiri'}}>مدير المنصة</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
