<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Mock Data (Used for initial seeding if DB is empty) ---
        const defaultLesson = {
            title: "مقدمة في الذكاء الاصطناعي (تجريبي)",
            content: "الذكاء الاصطناعي هو محاكاة للذكاء البشري بواسطة الآلات. ينقسم إلى نوعين: ضيق (محدد المهام) وعام (شامل).",
            isVisible: true,
            views: 0, attempts: 0,
            questions: [
                {id: 1, type: 'mcq', text: 'ما هو الاختصار الشائع للذكاء الاصطناعي؟', options: ['AI', 'VR', 'AR', 'IOT'], answer: 'ai', explanation: 'AI هي اختصار لـ Artificial Intelligence.'},
                {id: 2, type: 'tf', text: 'الذكاء الاصطناعي العام متخصص في مهمة واحدة فقط.', answer: 'false', explanation: 'خطأ، الذكاء العام يحاكي قدرة الإنسان الشاملة.'},
                {id: 3, type: 'mcq', text: 'أي مما يلي يعتبر من مجالات الذكاء الاصطناعي؟', options: ['التعلم الآلي', 'تصميم المواقع', 'الشبكات'], answer: 'التعلم الآلي', explanation: 'التعلم الآلي هو أحد الفروع الأساسية.'},
                {id: 4, type: 'tf', text: 'يمكن للذكاء الاصطناعي التعرف على الصور.', answer: 'true', explanation: 'نعم، تقنيات الرؤية الحاسوبية تمكنه من ذلك.'}
            ],
            flashcards: [{front: "AI", back: "الذكاء الاصطناعي"}, {front: "ANI", back: "الذكاء الضيق"}]
        };

        // --- Helpers ---
        const getLevelName = (level) => {
            if(level >= 10) return "عالم 👑";
            if(level >= 5) return "بروفيسور 🎓";
            if(level >= 3) return "خبير 🌟";
            return "مبتدئ 🌱";
        }

        const normalizeAnswer = (ans) => {
            if (typeof ans === 'boolean') return ans ? "true" : "false";
            if (!ans) return "false";
            const s = String(ans).trim().toLowerCase();
            if (s === 'sah' || s === 'صح' || s === 'true') return "true";
            if (s === 'khata' || s === 'خطأ' || s === 'wrong' || s === 'false') return "false";
            return s;
        };

        const shuffleArray = (array) => {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        };

        const processImage = (file) => {
            return new Promise((resolve, reject) => {
                if (!file) return reject("No file");
                if (!file.type.startsWith('image/')) return reject("Not an image");

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_SIZE = 300;
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                        } else {
                            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        resolve(dataUrl);
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        };

        // --- Main App ---
        const App = () => {
            const [view, setView] = useState('landing');
            const [lessons, setLessons] = useState([]);
            const [students, setStudents] = useState([]); 
            const [questionBank, setQuestionBank] = useState([]); // This could be derived or stored separate
            
            // Replaces Sticky States with standard state populated by Firebase
            const [adminPassword, setAdminPassword] = useState('1234');
            const [guestMessages, setGuestMessages] = useState([]);
            const [dbReady, setDbReady] = useState(false);

            const [currentUser, setCurrentUser] = useState(() => {
                try {
                    const saved = window.localStorage.getItem('currentUser');
                    return saved ? JSON.parse(saved) : null;
                } catch { return null; }
            });
            const [activeLesson, setActiveLesson] = useState(null);
            const [lessonMode, setLessonMode] = useState('take');

            // Persist currentUser to localStorage
            useEffect(() => {
                try {
                    if (currentUser) {
                        window.localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    } else {
                        window.localStorage.removeItem('currentUser');
                    }
                } catch {}
            }, [currentUser]);

            // Admin Access Logic
            const [adminClickCount, setAdminClickCount] = useState(0);
            const [showAdminPassModal, setShowAdminPassModal] = useState(false);
            const clickTimeoutRef = useRef(null);

            // --- Firebase Setup & Listeners ---
            useEffect(() => {
                const initFirebase = async () => {
                    if (window.auth) {
                        await window.signInAnonymously(window.auth);
                    }
                };
                initFirebase();

                if (!window.db) return;

                const appId = window.APP_ID;
                const publicDataPath = ['artifacts', appId, 'public', 'data'];

                // 1. Listen to Lessons
                const qLessons = window.query(window.collection(window.db, ...publicDataPath, 'lessons'));
                const unsubLessons = window.onSnapshot(qLessons, (snapshot) => {
                    const loadedLessons = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    // Initial seed if empty
                    if (loadedLessons.length === 0 && !dbReady) {
                        // Optional: Seed default lesson
                        // addLesson(defaultLesson); 
                        // For now we just set empty array or manual seed
                        setLessons([]); 
                    } else {
                        setLessons(loadedLessons);
                        // Rebuild basic question bank from lessons
                        const allQs = loadedLessons.flatMap(l => (l.questions || []).map(q => ({ ...q, lessonTitle: l.title, lessonId: l.id })));
                        setQuestionBank(allQs);
                    }
                    setDbReady(true);
                }, (err) => console.error("Lessons Sync Error:", err));

                // 2. Listen to Students
                const qStudents = window.query(window.collection(window.db, ...publicDataPath, 'students'));
                const unsubStudents = window.onSnapshot(qStudents, (snapshot) => {
                    const loadedStudents = snapshot.docs.map(d => ({ ...d.data(), nid: d.id })); // use doc ID as nid for uniqueness reference
                    setStudents(loadedStudents);
                }, (err) => console.error("Students Sync Error:", err));

                // 3. Listen to Guest Messages
                const qMsgs = window.query(window.collection(window.db, ...publicDataPath, 'guest_messages'));
                const unsubMsgs = window.onSnapshot(qMsgs, (snapshot) => {
                    setGuestMessages(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // 4. Listen to Settings (Admin Password)
                const docRef = window.doc(window.db, ...publicDataPath, 'settings', 'admin');
                const unsubSettings = window.onSnapshot(docRef, (doc) => {
                    if (doc.exists()) {
                        setAdminPassword(doc.data().password || '1234');
                    }
                });

                return () => {
                    unsubLessons();
                    unsubStudents();
                    unsubMsgs();
                    unsubSettings();
                };
            }, []);

            // Auto-refresh current user data if it changes in DB
            useEffect(() => {
                if (currentUser && currentUser.role === 'student') {
                    const freshUser = students.find(s => s.nid === currentUser.nid);
                    if (freshUser) {
                        // Deep compare to avoid loops is ideal, but JSON stringify works for simple objects
                        if (JSON.stringify(freshUser) !== JSON.stringify(currentUser)) {
                            setCurrentUser({...freshUser, role: 'student'});
                        }
                    }
                }
            }, [students, currentUser]);

            // --- Firebase Action Wrappers ---

            const fbAddLesson = async (l) => {
                // Use numeric ID as string for doc ID to maintain order if needed, or allow auto-ID
                const lessonId = l.id ? String(l.id) : String(Date.now());
                const newLesson = { ...l, id: lessonId, views: 0, attempts: 0, isVisible: true };
                await window.setDoc(window.doc(window.db, 'artifacts', window.APP_ID, 'public', 'data', 'lessons', lessonId), newLesson);
            };

            const fbUpdateLesson = async (l) => {
                await window.setDoc(window.doc(window.db, 'artifacts', window.APP_ID, 'public', 'data', 'lessons', String(l.id)), l, { merge: true });
            };

            const fbDeleteLesson = async (id) => {
                if(confirm("حذف الدرس نهائياً؟")) {
                    await window.deleteDoc(window.doc(window.db, 'artifacts', window.APP_ID, 'public', 'data', 'lessons', String(id)));
                }
            };

            const fbToggleVisibility = async (id) => {
                const l = lessons.find(x => x.id === id);
                if(l) await fbUpdateLesson({ ...l, isVisible: !l.isVisible });
            };

            const fbAddStudent = async (studentData) => {
                // Check local array first for immediate feedback, though Firestore rules should enforce unique IDs properly
                if(students.some(s => s.nid === studentData.nid)) return alert("رقم السجل المدني موجود مسبقاً");
                
                const newStudent = { 
                    ...studentData, 
                    xp: 0, level: 1, history: [], mistakes: [], srsQueue: [], lastLogin: null, streak: 0, badges: [],
                    hasCompletedSetup: false,
                    password: studentData.nid, 
                    mobile: '',
                    avatar: ''
                };
                
                await window.setDoc(window.doc(window.db, 'artifacts', window.APP_ID, 'public', 'data', 'students', String(studentData.nid)), newStudent);
            };

            const fbUpdateStudent = async (nid, newData) => {
                await window.setDoc(window.doc(window.db, 'artifacts', window.APP_ID, 'public', 'data', 'students', String(nid)), newData, { merge: true });
            };

            const fbDeleteStudent = async (nid) => {
                if(confirm("حذف الطالب؟")) {
                    await window.deleteDoc(window.doc(window.db, 'artifacts', window.APP_ID, 'public', 'data', 'students', String(nid)));
                }
            };
            
            const fbDeleteAllStudents = async () => {
                if(confirm("تحذير: هل أنت متأكد تماماً من حذف جميع الطلاب؟ لا يمكن التراجع عن هذا الإجراء.")) {
                    if(confirm("تأكيد نهائي: سيتم مسح قاعدة بيانات الطلاب بالكامل.")) {
                        // Batch delete is better but for simple loop:
                        for (let s of students) {
                            await window.deleteDoc(window.doc(window.db, 'artifacts', window.APP_ID, 'public', 'data', 'students', String(s.nid)));
                        }
                    }
                }
            };

            const fbAddGuestMessage = async (msgData) => {
                await window.addDoc(window.collection(window.db, 'artifacts', window.APP_ID, 'public', 'data', 'guest_messages'), {
                    ...msgData,
                    date: new Date().toLocaleDateString(),
                    timestamp: Date.now()
                });
                alert("تم إرسال رسالتك للمعلم بنجاح!");
            };

            const fbDeleteMessage = async (id) => {
                await window.deleteDoc(window.doc(window.db, 'artifacts', window.APP_ID, 'public', 'data', 'guest_messages', id));
            };

            const fbSetAdminPassword = async (newPass) => {
                await window.setDoc(window.doc(window.db, 'artifacts', window.APP_ID, 'public', 'data', 'settings', 'admin'), { password: newPass });
                setAdminPassword(newPass); // Optimistic update
            };

            // --- Original Logic Adapted ---

            const handleAdminTabClick = () => {
                // Prevent action if modal is already open
                if (showAdminPassModal) return;
                const newCount = adminClickCount + 1;
                setAdminClickCount(newCount);
                if (clickTimeoutRef.current) clearTimeout(clickTimeoutRef.current);
                clickTimeoutRef.current = setTimeout(() => { setAdminClickCount(0); }, 1000);
                if (newCount >= 5) {
                    setAdminClickCount(0);
                    setShowAdminPassModal(true);
                }
            };

            const confirmAdminPass = (pass) => {
                if (pass === adminPassword) {
                    setView('admin');
                    setShowAdminPassModal(false);
                } else {
                    alert("كلمة المرو�� غير صحيحة");
                }
            };

            const addBulkLessons = async (newLessons) => {
                const processed = newLessons.map((l, i) => {
                    const lessonId = String(Date.now() + (i * 1000) + Math.floor(Math.random() * 900));
                    return {
                        id: lessonId,
                        title: l.title || `درس ${i+1}`,
                        content: l.content || "محتوى الدرس...",
                        views: 0, attempts: 0, isVisible: true,
                        questions: (l.questions || []).map((q, qi) => {
                            const qTypeRaw = (q.type || 'mcq').toLowerCase();
                            const isTF = qTypeRaw === 'tf' || qTypeRaw === 'true_false' || qTypeRaw.includes('true');
                            return {
                                id: Date.now() + qi + 100 + Math.random(),
                                type: isTF ? 'tf' : 'mcq',
                                text: q.text || q.question || "سؤال بدون نص",
                                options: q.options || [],
                                answer: normalizeAnswer(q.answer),
                                explanation: q.explanation || "لا يوجد تبرير متاح."
                            };
                        }),
                        flashcards: (l.flashcards || []).map((f, fi) => ({
                            id: Date.now() + fi + 500 + Math.random(),
                            front: f.front || "مصطلح",
                            back: f.back || "تعريف"
                        }))
                    };
                });
                
                // Add sequentially to DB
                for(let l of processed) {
                    await fbAddLesson(l);
                }
            };

            const importStudents = async (csvText) => {
                const lines = csvText.split(/\r?\n/);
                let count = 0; 
                for(let line of lines) {
                    const [name, section, nid] = line.split(/[,;\t]/).map(s => s?.trim());
                    if(name && nid && !students.some(s => s.nid === nid)) {
                        await fbAddStudent({ name, section, nid });
                        count++;
                    }
                }
                if(count > 0) alert(`تم استيراد ${count} طالب`);
            };

            const resetStudentFull = async (nid) => {
                if(confirm("هل أنت متأكد من تصفير شامل للطالب؟")) {
                    await fbUpdateStudent(nid, { xp: 0, level: 1, history: [], mistakes: [], srsQueue: [], streak: 0, badges: [] });
                    return true;
                }
                return false;
            };
            
            const resetStudentLesson = async (nid, lessonId) => {
                if(confirm("هل تريد حذف تقدم الطالب في هذا الدرس ليتمكن من إعادته؟")) {
                    const s = students.find(st => st.nid === nid);
                    if(s) {
                        const newHistory = s.history.filter(h => h.lessonId !== lessonId);
                        await fbUpdateStudent(nid, { history: newHistory });
                    }
                }
            };

            const performLogin = async (studentObj) => {
                const today = new Date().toDateString();
                let updates = {};
                
                if(studentObj.lastLogin !== today) {
                    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                    if(studentObj.lastLogin === yesterday.toDateString()) {
                        updates.streak = (studentObj.streak || 0) + 1;
                    } else {
                        updates.streak = 1;
                    }
                    updates.lastLogin = today;
                }
                
                if(Object.keys(updates).length > 0) {
                    await fbUpdateStudent(studentObj.nid, updates);
                    setCurrentUser({ ...studentObj, ...updates, role: 'student' });
                } else {
                    setCurrentUser({ ...studentObj, role: 'student' });
                }
                setView('student-dash');
            };

            const loginGuest = () => { setCurrentUser({ name: "زائر", role: "guest", xp: 0, level: 1 }); setView('student-dash'); };
            
            const updateUserProgress = async (lessonId, score, newMistakes, passed) => {
                if(currentUser.role === 'guest') return;
                
                const s = students.find(st => st.nid === currentUser.nid);
                if(!s) return;

                let xpGain = score;
                const newTotalXP = (s.xp || 0) + xpGain;
                const newLevel = Math.floor(newTotalXP / 200) + 1;
                const newHistory = [...(s.history||[]), { lessonId, score, date: new Date().toLocaleDateString() }];
                
                let newSrs = [...(s.srsQueue || [])];
                const currentLesson = lessons.find(l => l.id === lessonId);
                const lessonQs = currentLesson?.questions || [];
                
                // Add correct questions to SRS if not present
                const correctQs = lessonQs.filter(q => !newMistakes.find(m => m.text === q.text));
                correctQs.forEach(q => { 
                    if(!newSrs.find(sq => sq.text === q.text)) {
                        newSrs.push({ ...q, nextReview: Date.now() + 86400000, stage: 1 }); 
                    }
                });
                
                // Add unique mistakes
                const currentMistakeTexts = new Set((s.mistakes || []).map(m => m.text));
                const uniqueNewMistakes = newMistakes.filter(m => !currentMistakeTexts.has(m.text));
                const finalMistakes = [...(s.mistakes || []), ...uniqueNewMistakes];

                await fbUpdateStudent(s.nid, { xp: newTotalXP, level: newLevel, history: newHistory, mistakes: finalMistakes, srsQueue: newSrs });
                
                // Update lesson views locally then push (optional, or rely on just student data for analytics)
                if (currentLesson) {
                   await fbUpdateLesson({ ...currentLesson, views: (currentLesson.views||0) + 1 }); 
                }
            };

            const solveMistake = async (id) => {
                if(currentUser.role === 'guest') return;
                const s = students.find(st => st.nid === currentUser.nid);
                if(s) {
                     await fbUpdateStudent(s.nid, { 
                         mistakes: s.mistakes.filter(x => x.id!==id), 
                         xp: s.xp + 15 
                     });
                     confetti();
                }
            };

            const handleSRSReview = async (q, remembered) => {
                if(currentUser.role === 'guest') return;
                const s = students.find(st => st.nid === currentUser.nid);
                if(s) {
                    let newSrs = s.srsQueue.filter(item => item.text !== q.text);
                    let updates = {};
                    if(remembered) {
                        const nextStage = (q.stage || 1) + 1; const days = nextStage === 2 ? 7 : 30;
                        newSrs.push({ ...q, nextReview: Date.now() + (days*86400000), stage: nextStage });
                        updates = { srsQueue: newSrs, xp: s.xp + 15 };
                    } else {
                        newSrs.push({ ...q, nextReview: Date.now() + 86400000, stage: 1 });
                        updates = { srsQueue: newSrs };
                    }
                    await fbUpdateStudent(s.nid, updates);
                }
            };

            const handleLogout = () => { setCurrentUser(null); setView('landing'); };
            const handleLogoClick = () => { if (currentUser) { setView('student-dash'); } else { setView('landing'); } };
            const handleProfileUpdate = async (nid, newData) => { await fbUpdateStudent(nid, newData); };

            // Admin Password Modal Component
            const AdminPassModal = () => {
                const [pass, setPass] = useState('');
                return (
                    <div className="modal-overlay">
                        <div className="bg-white p-6 rounded-2xl shadow-xl w-80 text-center">
                            <h3 className="font-bold text-lg mb-4">دخول المعلم المحمي</h3>
                            <input type="password" className="w-full p-2 border rounded mb-4 text-center" placeholder="كلمة المرور" value={pass} onChange={e => setPass(e.target.value)} autoFocus />
                            <div className="flex gap-2">
                                <button onClick={() => confirmAdminPass(pass)} className="flex-1 bg-primary text-white py-2 rounded font-bold">دخول</button>
                                <button onClick={() => setShowAdminPassModal(false)} className="flex-1 bg-slate-200 text-slate-700 py-2 rounded font-bold">إلغاء</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // StickyState helper for API key only (keep local)
            const useStickyState = (defaultValue, key) => {
                const [value, setValue] = useState(() => {
                    const stickyValue = window.localStorage.getItem(key);
                    return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
                });
                useEffect(() => { window.localStorage.setItem(key, JSON.stringify(value)); }, [key, value]);
                return [value, setValue];
            };

            return (
                <div className="min-h-screen flex flex-col text-slate-800 bg-slate-50">
                    <NavBar view={view} setView={setView} user={currentUser} onLogoClick={handleLogoClick} onLogout={handleLogout} onAdminClick={handleAdminTabClick} />
                    {showAdminPassModal && <AdminPassModal />}
                    <main className="flex-grow container mx-auto p-4 md:p-6 max-w-7xl">
                        {view === 'landing' && <Landing setView={setView} loginGuest={loginGuest} />}
                        {view === 'admin' && <AdminDashboard lessons={lessons} addLesson={fbAddLesson} updateLesson={fbUpdateLesson} deleteLesson={fbDeleteLesson} toggleVisibility={fbToggleVisibility} addBulkLessons={addBulkLessons} students={students} addStudent={fbAddStudent} updateStudentFull={fbUpdateStudent} deleteStudent={fbDeleteStudent} deleteAllStudents={fbDeleteAllStudents} importStudents={importStudents} exportStudents={() => {/* Export Logic Same */}} questionBank={questionBank} resetStudentFull={resetStudentFull} resetStudentLesson={resetStudentLesson} guestMessages={guestMessages} deleteMessage={fbDeleteMessage} adminPassword={adminPassword} setAdminPassword={fbSetAdminPassword} useStickyState={useStickyState} />}
                        {view === 'student-login' && <StudentLogin students={students} onLogin={performLogin} updateStudentFull={fbUpdateStudent} />}
                        {view === 'student-dash' && <StudentDashboard user={currentUser} students={students} lessons={lessons} setView={setView} setActiveLesson={setActiveLesson} setLessonMode={setLessonMode} onProfileUpdate={handleProfileUpdate} onSendMessage={fbAddGuestMessage} />}
                        {view === 'lesson' && <LessonView lesson={activeLesson} user={currentUser} onComplete={updateUserProgress} onBack={() => setView('student-dash')} mode={lessonMode} />}
                        {view === 'flashcards' && <FlashcardsView lesson={activeLesson} onBack={() => setView('student-dash')} />}
                        {view === 'srs' && <SRSView user={currentUser} onReview={handleSRSReview} onBack={() => setView('student-dash')} />}
                        {view === 'mistakes' && <MistakeVault user={currentUser} onSolve={solveMistake} onBack={() => setView('student-dash')} />}
                        {view === 'certificate' && <Certificate user={currentUser} onBack={() => setView('student-dash')} />}
                    </main>
                </div>
            );
        };

        const NavBar = ({ view, setView, user, onLogoClick, onLogout, onAdminClick }) => (
            <nav className="glass sticky top-0 z-50 border-b px-4 py-3 flex justify-between items-center shadow-sm">
                <div className="flex items-center gap-2 cursor-pointer" onClick={onLogoClick}>
                    <div className="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg"><i className="fas fa-lightbulb"></i></div>
                    <div><h1 className="font-bold text-lg">منصة التفسير</h1><p className="text-[10px] text-slate-500 font-bold">LMS TAFSER</p></div>
                </div>
                {user && user.role === 'student' && (
                    <div className="hidden md:flex items-center gap-3 bg-white px-3 py-1 rounded-full border shadow-sm">
                        {user.avatar ? <img src={user.avatar} className="w-8 h-8 rounded-full border bg-white object-cover" /> : <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500"><i className="fas fa-user"></i></div>}
                        <span className="font-bold text-sm text-slate-700">{user.name}</span>
                        <span className="text-xs text-gold font-bold"><i className="fas fa-star"></i> {user.xp}</span>
                    </div>
                )}
                <div className="flex gap-2 text-xs md:text-sm items-center">
                    <button onClick={onAdminClick} className="text-primary hover:text-blue-700 font-bold bg-blue-50 px-3 py-1 rounded-lg border border-blue-100 select-none active:scale-95 transition"><i className="fas fa-chalkboard-teacher"></i> المعلم</button>
                    {user && (
                        <button onClick={onLogout} title="تسجيل الخروج" className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition border border-transparent hover:border-red-100">
                            <i className="fas fa-sign-out-alt text-lg"></i>
                        </button>
                    )}
                </div>
            </nav>
        );

        const Landing = ({ setView, loginGuest }) => (
            <div className="text-center py-24 fade-in flex flex-col items-center justify-center">
                <h1 className="text-6xl font-extrabold mb-6 text-slate-900 tracking-tight">التعليم <span className="text-primary">الذكي</span></h1>
                <p className="text-xl text-slate-500 mb-10 max-w-lg"> منصة متكاملة لعرض دروس التفسير للصف الاول ثانوي بثانوية عشيرة</p>
                <div className="flex flex-col gap-4 w-full max-w-xs">
                    <button onClick={() => setView('student-login')} className="bg-primary text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 transition flex items-center justify-center gap-2 w-full"><i className="fas fa-user-graduate"></i> دخول الطالب</button>
                    <button onClick={loginGuest} className="bg-white text-slate-700 border-2 border-slate-200 px-8 py-4 rounded-2xl font-bold hover:bg-slate-50 transition flex items-center justify-center gap-2 w-full"><i className="fas fa-eye"></i> تصفح كزائر</button>
                </div>
            </div>
        );

        const StudentLogin = ({ students, onLogin, updateStudentFull }) => {
            const [nid, setNid] = useState('');
            const [step, setStep] = useState('check_nid'); 
            const [student, setStudent] = useState(null);
            
            const [newPass, setNewPass] = useState('');
            const [mobile, setMobile] = useState('');
            const [avatarFile, setAvatarFile] = useState(null);
            
            const [password, setPassword] = useState('');
            const [forgotMobile, setForgotMobile] = useState('');
            const [isUploading, setIsUploading] = useState(false);

            const handleCheckNid = () => {
                const s = students.find(s => s.nid === nid);
                if (!s) return alert("رقم السجل المدني غير مسجل. راجع المعلم.");
                setStudent(s);
                if (!s.hasCompletedSetup) {
                    setStep('setup_profile');
                } else {
                    setStep('password_login');
                }
            };

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                try {
                    const compressed = await processImage(file);
                    setAvatarFile(compressed);
                } catch(err) {
                    alert("خطأ في معالجة الصورة. تأكد من نوع الملف.");
                }
                setIsUploading(false);
            };

            const handleSetup = async () => {
                if (!newPass) return alert("كلمة المرور مطلوبة");
                await updateStudentFull(student.nid, {
                    password: newPass,
                    mobile: mobile,
                    avatar: avatarFile || student.avatar,
                    hasCompletedSetup: true
                });
                alert("تم تحديث بياناتك بنجاح. يمكنك الدخول الآن.");
                const updatedS = { ...student, password: newPass, mobile, avatar: avatarFile || student.avatar, hasCompletedSetup: true };
                onLogin(updatedS);
            };

            const handlePasswordLogin = () => {
                if (password === student.password) {
                    onLogin(student);
                } else {
                    alert("كلمة المرور غير صحيحة");
                }
            };

            const handleForgotCheck = () => {
                if (!student.mobile || student.mobile !== forgotMobile) {
                    alert("رقم الجوال غير صحيح أو غير مسجل. يرجى التواصل مع المعلم لاستعادة حسابك.");
                } else {
                    alert(`كلمة المرور الخاصة بك هي: ${student.password}`);
                    setStep('password_login');
                }
            };

            return (
                <div className="flex justify-center items-center min-h-[70vh] fade-in p-4">
                    <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl w-full max-w-md text-center border border-slate-100">
                        <h2 className="text-3xl font-extrabold mb-8 text-slate-800">بوابة الطالب</h2>
                        
                        {step === 'check_nid' && (
                            <div className="fade-in">
                                <label className="block text-right text-sm font-bold text-slate-500 mb-2">رقم السجل المدني</label>
                                <input className="w-full p-4 bg-slate-50 rounded-xl mb-4 text-center border focus:border-primary outline-none font-bold text-lg font-mono" placeholder="1XXXXXXXXX" value={nid} onChange={e => setNid(e.target.value)} />
                                <button onClick={handleCheckNid} className="w-full bg-primary text-white p-4 rounded-xl font-bold hover:shadow-lg transition">التالي</button>
                            </div>
                        )}

                        {step === 'setup_profile' && (
                            <div className="fade-in text-right">
                                <div className="bg-blue-50 p-3 rounded-lg text-xs text-blue-700 mb-4 font-bold text-center">👋 مرحباً بك {student.name}! بما أن هذا دخولك الأول، يرجى إكمال بياناتك.</div>
                                <label className="block text-sm font-bold text-slate-500 mb-1">أنشئ كلمة مرور (إجباري)</label>
                                <input type="password" className="w-full p-3 border rounded-xl mb-3" value={newPass} onChange={e => setNewPass(e.target.value)} placeholder="*****" />
                                
                                <label className="block text-sm font-bold text-slate-500 mb-1">رقم الجوال (اختياري - لاستعادة الحساب)</label>
                                <input className="w-full p-3 border rounded-xl mb-3" value={mobile} onChange={e => setMobile(e.target.value)} placeholder="05XXXXXXXX" />
                                
                                <label className="block text-sm font-bold text-slate-500 mb-1">صورة الملف الشخصي (اختياري)</label>
                                <input type="file" accept="image/*" className="w-full text-sm mb-4" onChange={handleFileChange} />
                                {isUploading && <div className="text-xs text-blue-500 mb-2">جاري معالجة الصورة...</div>}
                                {avatarFile && <img src={avatarFile} className="w-16 h-16 rounded-full mx-auto mb-4 border-2 border-primary object-cover" />}
                                
                                <button onClick={handleSetup} disabled={isUploading} className="w-full bg-green-600 text-white p-4 rounded-xl font-bold hover:shadow-lg transition disabled:opacity-50">حفظ ودخول</button>
                            </div>
                        )}

                        {step === 'password_login' && (
                            <div className="fade-in">
                                <h3 className="font-bold text-xl mb-4">مرحباً {student.name}</h3>
                                {student.avatar && <img src={student.avatar} className="w-20 h-20 rounded-full mx-auto mb-6 shadow-md object-cover" />}
                                <input type="password" className="w-full p-4 bg-slate-50 rounded-xl mb-4 text-center border focus:border-primary outline-none font-bold" placeholder="كلمة المرور" value={password} onChange={e => setPassword(e.target.value)} />
                                <button onClick={handlePasswordLogin} className="w-full bg-primary text-white p-4 rounded-xl font-bold hover:shadow-lg transition mb-4">دخول</button>
                                <button onClick={() => setStep('forgot_password')} className="text-sm text-slate-400 hover:text-primary underline">نسيت كلمة المرور؟</button>
                            </div>
                        )}

                        {step === 'forgot_password' && (
                            <div className="fade-in text-right">
                                <h3 className="font-bold text-lg mb-2 text-center">استعادة كلمة المرور</h3>
                                <p className="text-xs text-slate-500 mb-4 text-center">أدخل رقم الجوال الذي قمت بتسجيله مسبقاً.</p>
                                <input className="w-full p-3 border rounded-xl mb-4 text-center" placeholder="رقم الجوال" value={forgotMobile} onChange={e => setForgotMobile(e.target.value)} />
                                <button onClick={handleForgotCheck} className="w-full bg-slate-800 text-white p-3 rounded-xl font-bold mb-2">تحقق</button>
                                <button onClick={() => setStep('password_login')} className="w-full text-slate-500 p-2">إلغاء</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const StudentDashboard = ({ user, students, lessons, setView, setActiveLesson, setLessonMode, onProfileUpdate, onSendMessage }) => {
            const [showEditProfile, setShowEditProfile] = useState(false);
            const [showStudentSearch, setShowStudentSearch] = useState(false);
            const [showContact, setShowContact] = useState(false);

            // Profile Edit state (moved outside inner component to prevent re-creation)
            const [editData, setEditData] = useState({ password: '', mobile: '', avatar: '' });
            const [newAvatar, setNewAvatar] = useState(null);
            const [editLoading, setEditLoading] = useState(false);

            // Initialize edit data when modal opens
            React.useEffect(() => {
                if (showEditProfile) {
                    setEditData({ password: user.password || '', mobile: user.mobile || '', avatar: user.avatar || '' });
                    setNewAvatar(null);
                    setEditLoading(false);
                }
            }, [showEditProfile]);
            
            const visibleLessons = lessons.filter(l => l.isVisible);
            const reviewCount = user.role === 'student' ? (user.srsQueue?.filter(q => q.nextReview <= Date.now()).length || 0) : 0;
            const mistakesCount = user.role === 'student' ? (user.mistakes?.length || 0) : 0;

            const getLessonStatus = (lessonId) => {
                if(user.role === 'guest') return { status: 'new', score: 0 };
                const history = user.history?.filter(h => h.lessonId === lessonId) || [];
                if(history.length === 0) return { status: 'new', score: 0 };
                const bestScore = Math.max(...history.map(h => h.score));
                return { status: bestScore >= 50 ? 'passed' : 'failed', score: bestScore };
            };

            const handleLessonClick = (l) => {
                const { status } = getLessonStatus(l.id);
                if(status === 'passed') { setLessonMode('review'); setActiveLesson(l); setView('lesson'); } 
                else if(status === 'failed') { alert("💪 لم تجتز هذا الدرس بعد. حاول مرة أخرى بتركيز أكبر!"); setLessonMode('take'); setActiveLesson(l); setView('lesson'); } 
                else { setLessonMode('take'); setActiveLesson(l); setView('lesson'); }
            };

            // Guest Search Inner Component
            const StudentSearchModal = () => {
                const [searchNid, setSearchNid] = useState('');
                const [result, setResult] = useState(null);
                const [error, setError] = useState('');

                const doSearch = () => {
                    const s = students.find(x => x.nid === searchNid);
                    if(s) { setResult(s); setError(''); }
                    else { setError('عذراً، السجل المدني غير موجود في النظام.'); setResult(null); }
                };

                return (
                    <div className="modal-overlay">
                        <div className="bg-white p-6 rounded-2xl w-full max-w-sm m-4 shadow-2xl relative">
                            <button onClick={()=>setShowStudentSearch(false)} className="absolute top-4 left-4 text-slate-400 hover:text-slate-600"><i className="fas fa-times"></i></button>
                            <h3 className="font-bold text-xl mb-4 text-center">بحث عن طالب</h3>
                            {!result ? (
                                <div>
                                    <input className="w-full p-3 border rounded-xl mb-3 text-center" placeholder="أدخل السجل المدني" value={searchNid} onChange={e => setSearchNid(e.target.value)} />
                                    <button onClick={doSearch} className="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">بحث</button>
                                    {error && <p className="text-red-500 text-sm text-center mt-3">{error}</p>}
                                </div>
                            ) : (
                                <div className="text-center fade-in">
                                    {result.avatar ? <img src={result.avatar} className="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-blue-100" /> : <div className="w-24 h-24 rounded-full bg-slate-200 mx-auto mb-4 flex items-center justify-center text-4xl text-slate-400"><i className="fas fa-user"></i></div>}
                                    <h2 className="text-2xl font-bold text-slate-800">{result.name}</h2>
                                    <p className="text-slate-500 mb-4">{getLevelName(result.level)}</p>
                                    <div className="flex justify-center gap-4 text-sm">
                                        <div className="bg-yellow-50 px-4 py-2 rounded-lg border border-yellow-100"><span className="block font-bold text-gold text-lg">{result.xp}</span>نقاط</div>
                                        <div className="bg-purple-50 px-4 py-2 rounded-lg border border-purple-100"><span className="block font-bold text-purple-600 text-lg">{result.history?.length || 0}</span>درس</div>
                                    </div>
                                    <button onClick={()=>setResult(null)} className="mt-6 text-blue-500 underline text-sm">بحث جديد</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // Guest Message Modal
            const ContactModal = () => {
                const [name, setName] = useState('');
                const [msg, setMsg] = useState('');
                const send = () => {
                    if(!name || !msg) return alert("اكتب الاسم والرسالة");
                    onSendMessage({sender: name, text: msg});
                    setShowContact(false);
                };
                return (
                    <div className="modal-overlay">
                        <div className="bg-white p-6 rounded-2xl w-full max-w-sm m-4 shadow-2xl relative">
                            <h3 className="font-bold text-xl mb-4 text-center">راسل المعلم</h3>
                            <input className="w-full p-3 border rounded-xl mb-3" placeholder="اسمك" value={name} onChange={e=>setName(e.target.value)} />
                            <textarea className="w-full p-3 border rounded-xl mb-3 h-32" placeholder="رسالتك..." value={msg} onChange={e=>setMsg(e.target.value)}></textarea>
                            <div className="flex gap-2">
                                <button onClick={send} className="flex-1 bg-green-600 text-white py-2 rounded-xl font-bold">إرسال</button>
                                <button onClick={()=>setShowContact(false)} className="flex-1 bg-slate-200 text-slate-700 py-2 rounded-xl font-bold">إلغاء</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // Profile Edit Handlers (moved outside to prevent re-creation)
            const handleProfileSave = () => {
                onProfileUpdate(user.nid, { ...editData, avatar: newAvatar || editData.avatar });
                setShowEditProfile(false);
            };

            const handleProfileImg = async (e) => {
                 const file = e.target.files[0];
                 if(!file) return;
                 setEditLoading(true);
                 try {
                     const compressed = await processImage(file);
                     setNewAvatar(compressed);
                 } catch(err) { console.log("حدث خطأ في تحميل الصورة"); }
                 setEditLoading(false);
            };

            const handleDeleteProfileImg = () => {
                setNewAvatar(null);
                setEditData({...editData, avatar: ''});
            };

            return (
                <div className="grid lg:grid-cols-3 gap-8 fade-in">
                    {showEditProfile && (
                        <div className="modal-overlay">
                            <div className="bg-white p-6 rounded-2xl w-full max-w-sm m-4 shadow-2xl">
                                <h3 className="font-bold text-xl mb-4 border-b pb-2">تعديل بياناتي</h3>
                                <div className="space-y-3 mb-6">
                                    <div><label className="text-xs font-bold text-slate-500">كلمة المرور</label><input className="w-full p-2 border rounded" type="password" value={editData.password} onChange={e=>setEditData({...editData, password: e.target.value})} /></div>
                                    <div><label className="text-xs font-bold text-slate-500">رقم الجوال</label><input className="w-full p-2 border rounded" value={editData.mobile} onChange={e=>setEditData({...editData, mobile: e.target.value})} /></div>
                                    <div><label className="text-xs font-bold text-slate-500">الصورة</label><input type="file" accept="image/*" className="text-xs w-full" onChange={handleProfileImg} /></div>
                                    {editLoading && <div className="text-xs text-blue-500">جاري المعالجة...</div>}
                                    {(newAvatar || editData.avatar) && (
                                        <div className="flex items-center gap-2 mt-2">
                                            <img src={newAvatar || editData.avatar} className="w-12 h-12 rounded-full object-cover border" />
                                            <button onClick={handleDeleteProfileImg} className="text-xs text-red-500 bg-red-50 px-2 py-1 rounded">حذف الصورة</button>
                                        </div>
                                    )}
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={handleProfileSave} disabled={editLoading} className="flex-1 bg-primary text-white py-2 rounded-lg font-bold disabled:opacity-50">حفظ</button>
                                    <button onClick={()=>setShowEditProfile(false)} className="flex-1 bg-slate-200 text-slate-700 py-2 rounded-lg font-bold">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showStudentSearch && <StudentSearchModal />}
                    {showContact && <ContactModal />}
                    <div className="lg:col-span-1 space-y-6">
                        <div className="bg-white p-6 rounded-3xl shadow-sm border h-fit sticky top-24">
                            <div className="text-center mb-8">
                                <div className="w-24 h-24 mx-auto bg-gradient-to-br from-primary to-blue-400 text-white rounded-full flex items-center justify-center text-4xl font-bold mb-4 shadow-xl border-4 border-white overflow-hidden">
                                    {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover" /> : (user.role === 'guest' ? 'G' : user.level)}
                                </div>
                                <h3 className="font-bold text-xl">{user.role === 'guest' ? 'زائر' : getLevelName(user.level)}</h3>
                                {user.role === 'student' && (<><p className="text-slate-900 font-bold text-lg mt-2">{user.name}</p><p className="text-slate-400 text-sm">{user.xp} نقطة</p></>)}
                            </div>
                            {user.role === 'student' && (
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    <button onClick={() => setView('srs')} className="bg-orange-50 text-orange-600 p-4 rounded-2xl font-bold border border-orange-100 relative hover:bg-orange-100 transition flex flex-col items-center gap-1"><i className="fas fa-brain text-xl"></i> مراجعة {reviewCount > 0 && <span className="absolute top-2 right-2 bg-red-500 text-white text-xs w-5 h-5 rounded-full animate-bounce">{reviewCount}</span>}</button>
                                    <button onClick={() => setView('mistakes')} className="bg-red-50 text-red-600 p-4 rounded-2xl font-bold border border-red-100 relative hover:bg-red-100 transition flex flex-col items-center gap-1"><i className="fas fa-bug text-xl"></i> أخطائي {mistakesCount > 0 && <span className="absolute top-2 right-2 bg-red-500 text-white text-xs w-5 h-5 rounded-full">{mistakesCount}</span>}</button>
                                    <button onClick={() => setView('certificate')} className="col-span-2 bg-slate-800 text-white p-3 rounded-xl font-bold hover:bg-black transition flex items-center justify-center gap-2"><i className="fas fa-certificate"></i> شهادتي</button>
                                    <button onClick={() => setShowEditProfile(true)} className="col-span-2 bg-white text-slate-600 border border-slate-200 p-2 rounded-xl font-bold hover:bg-slate-50 transition flex items-center justify-center gap-2 text-sm"><i className="fas fa-user-edit"></i> تعديل بياناتي</button>
                                </div>
                            )}
                            {user.role === 'guest' && (
                                <div className="space-y-3">
                                    <div className="bg-yellow-50 p-4 rounded text-center text-sm text-yellow-800">وضع الزائر: المشاهدة فقط</div>
                                    <button onClick={() => setShowContact(true)} className="w-full bg-white border border-blue-200 text-blue-600 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-blue-50 transition"><i className="fas fa-envelope"></i> راسل المعلم</button>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="lg:col-span-2 space-y-4">
                        <div className="flex items-center gap-2 mb-4">
                            <h2 className="text-2xl font-bold text-slate-800">الدروس المتاحة</h2>
                            {user.role === 'guest' && (
                                <button onClick={()=>setShowStudentSearch(true)} className="bg-white border text-slate-500 hover:text-blue-600 w-8 h-8 rounded-full flex items-center justify-center transition shadow-sm" title="بحث عن طالب">
                                    <i className="fas fa-search"></i>
                                </button>
                            )}
                        </div>
                        {visibleLessons.length === 0 && <div className="text-center p-8 bg-white rounded-2xl text-slate-500">لا توجد دروس حالياً...</div>}
                        {visibleLessons.map(l => {
                            const { status, score } = getLessonStatus(l.id);
                            return (
                                <div key={l.id} className="bg-white p-6 rounded-2xl shadow-sm border hover:shadow-lg transition flex justify-between items-center group">
                                    <div className="w-full">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="font-bold text-lg text-slate-800">{l.title}</h3>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => handleLessonClick(l)} className="text-xs bg-primary text-white px-4 py-2.5 rounded-full font-bold hover:bg-blue-700 transition flex-1 md:flex-none justify-center">{status === 'passed' ? 'مراجعة الدرس' : 'بدء ال��رس'}</button>
                                            <button onClick={() => {setActiveLesson(l); setView('flashcards')}} className="text-xs bg-purple-50 text-purple-600 px-4 py-2.5 rounded-full font-bold border border-purple-100 hover:bg-purple-100 transition flex-1 md:flex-none justify-center">بطاقات</button>
                                            {user.role !== 'guest' && (
                                                <div className={`text-xs px-4 py-2.5 rounded-full font-bold border flex items-center justify-center flex-1 md:flex-none ${status==='passed'?'bg-green-100 text-green-700 border-green-200':status==='failed'?'bg-red-100 text-red-700 border-red-200':'bg-blue-50 text-blue-700 border-blue-100'}`}>
                                                    {status === 'passed' ? `✅ ${score}%` : status === 'failed' ? '⚠️ إعادة' : '🆕 جديد'}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const AdminDashboard = ({ lessons, addLesson, updateLesson, deleteLesson, toggleVisibility, addBulkLessons, students, addStudent, updateStudentFull, deleteStudent, deleteAllStudents, importStudents, exportStudents, questionBank, resetStudentFull, resetStudentLesson, guestMessages, deleteMessage, adminPassword, setAdminPassword, useStickyState }) => {
            const [tab, setTab] = useState('manage'); 
            const [lesson, setLesson] = useState({ title: '', content: '', questions: [], flashcards: [] });
            const [bulkText, setBulkText] = useState('');
            const [apiKey, setApiKey] = useStickyState('', 'gemini_api_key');
            const [loading, setLoading] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [newStd, setNewStd] = useState({name: '', section: '', nid: ''});
            const [genConfig, setGenConfig] = useState({ mcq: 4, tf: 2, cards: 3 });
            
            const [studentSearch, setStudentSearch] = useState('');
            const [studentSort, setStudentSort] = useState('name-asc');
            const [studentPage, setStudentPage] = useState(1);
            const [editingStudent, setEditingStudent] = useState(null);
            const [viewingStudent, setViewingStudent] = useState(null);
            const [enlargedImg, setEnlargedImg] = useState(null);

            const STUDENTS_PER_PAGE = 20;

            const callGemini = async (prompt) => {
                if(!apiKey) throw new Error("مفتاح API مفقود");
                const modelsResp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                if(!modelsResp.ok) throw new Error("مفتاح خطأ أو مشكلة في الاتصال");
                const modelsData = await modelsResp.json();
                const validModels = modelsData.models?.filter(m => m.supportedGenerationMethods?.includes("generateContent")) || [];
                if(validModels.length === 0) throw new Error("لا يوجد موديل");
                let selectedModel = validModels.find(m => m.name.includes("gemini-1.5-flash")) || validModels[0];
                const modelName = selectedModel.name.startsWith('models/') ? selectedModel.name.split('/')[1] : selectedModel.name;
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await resp.json();
                if(!data.candidates) throw new Error("فشل التوليد");
                return data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
            };

            const generateSingle = async () => {
                if(!lesson.content) return alert("أدخل المحتوى");
                setLoading(true);
                try {
                    const prompt = `Analyze content: "${lesson.content}". Output STRICT JSON: { "questions": Array of ${genConfig.mcq} MCQs and ${genConfig.tf} True/False questions (total ${parseInt(genConfig.mcq)+parseInt(genConfig.tf)} questions). For MCQ keys: type="mcq", text, options[], answer (lowercase), explanation(Arabic). For TF keys: type="tf", text, answer ("true" or "false" string), explanation. "flashcards": Array of ${genConfig.cards} objects {front, back} }`;
                    const json = JSON.parse(await callGemini(prompt));
                    const qs = json.questions.map((q, i) => ({ ...q, id: Date.now()+i, answer: normalizeAnswer(q.answer) }));
                    const fs = json.flashcards.map((f, i) => ({...f, id: Date.now()+i+100}));
                    setLesson(prev => ({...prev, questions: qs, flashcards: fs}));
                    alert("✅ تم التوليد");
                } catch(e) { alert("Error: "+e.message); }
                setLoading(false);
            };

            const generateBulk = async () => {
                if(!bulkText) return alert("أدخل النص");
                setLoading(true);
                try {
                    const prompt = `Split text into separate logical lessons. Text: "${bulkText}". Output JSON Array: [{ title, content, questions: [Array of ${genConfig.mcq} MCQs and ${genConfig.tf} TF questions. CRITICAL - Each question MUST use these exact keys: "type" (must be "mcq" or "tf"), "text" (question content), "options" (array for mcq), "answer" (correct answer), "explanation" (reasoning in Arabic)], flashcards: [Array of ${genConfig.cards} objects {front, back}] }]. Ensure JSON validity.`;
                    const lessonsArray = JSON.parse(await callGemini(prompt));
                    await addBulkLessons(lessonsArray);
                    setBulkText('');
                    alert(`✅ تمت إضافة ${lessonsArray.length} دروس!`);
                    setTab('manage');
                } catch(e) { alert("Error: "+e.message); }
                setLoading(false);
            };

            const handleSaveLesson = () => {
                if(editingId) { updateLesson(lesson); setEditingId(null); alert("تم التحديث"); } 
                else { addLesson(lesson); alert("تم النشر"); }
                setLesson({ title: '', content: '', questions: [], flashcards: [] }); setTab('manage');
            };

            const startEdit = (l) => { setLesson(l); setEditingId(l.id); setTab('create'); };
            const updateQ = (idx, field, val) => { const newQs = [...lesson.questions]; newQs[idx][field] = val; setLesson({...lesson, questions: newQs}); };
            const updateOption = (qIdx, optIdx, val) => { const newQs = [...lesson.questions]; newQs[qIdx].options[optIdx] = val; setLesson({...lesson, questions: newQs}); };
            const addQuestion = () => { setLesson({...lesson, questions: [...lesson.questions, {id: Date.now(), type: 'mcq', text: 'سؤال جديد', options: ['خيار 1', 'خيار 2'], answer: 'خيار 1', explanation: ''}]}); };
            const removeQuestion = (idx) => { setLesson({...lesson, questions: lesson.questions.filter((_, i) => i !== idx)}); };

            // Filtering and Sorting
            let filteredStudents = students.filter(s => s.name.includes(studentSearch) || s.nid.includes(studentSearch));
            
            filteredStudents.sort((a, b) => {
                if (studentSort === 'name-asc') return a.name.localeCompare(b.name);
                if (studentSort === 'section-asc') return (a.section || '').localeCompare(b.section || '');
                if (studentSort === 'xp-desc') return b.xp - a.xp;
                return 0;
            });

            const totalPages = Math.ceil(filteredStudents.length / STUDENTS_PER_PAGE);
            const displayedStudents = filteredStudents.slice((studentPage - 1) * STUDENTS_PER_PAGE, studentPage * STUDENTS_PER_PAGE);

            const handleFileImport = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => { importStudents(evt.target.result); };
                reader.readAsText(file);
            };

            const saveStudentEdit = () => {
                if(editingStudent) { updateStudentFull(editingStudent.originalNid, editingStudent); setEditingStudent(null); }
            };
            
            const handleResetLesson = (lessonId) => {
                 resetStudentLesson(viewingStudent.nid, lessonId);
                 setViewingStudent(prev => ({
                     ...prev,
                     history: prev.history.filter(h => h.lessonId !== lessonId)
                 }));
            };

            const handleFullReset = async () => {
                const success = await resetStudentFull(viewingStudent.nid);
                if(success) {
                    setViewingStudent(prev => ({...prev, xp: 0, level: 1, history: [], mistakes: [], srsQueue: [], streak: 0, badges: []}));
                }
            };

            const handleAdminImg = async (e) => {
                 const file = e.target.files[0];
                 if(!file) return;
                 try {
                     const compressed = await processImage(file);
                     setEditingStudent({...editingStudent, avatar: compressed});
                 } catch(err) { alert("خطأ في الصورة"); }
            };
            
            const exportDataAsCsv = () => {
                if(students.length === 0) return alert("لا يوجد طلاب للتصدير");
                const bom = "\uFEFF"; 
                const headers = "الاسم,الشعبة,السجل المدني,كلمة المرور,رقم الجوال,النقاط (XP),المستوى\n";
                const rows = students.map(s => `${s.name},${s.section||''},${s.nid},${s.password},${s.mobile||''},${s.xp},${s.level}`).join("\n");
                const csvContent = bom + headers + rows;
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `students_export_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            return (
                <div className="grid lg:grid-cols-4 gap-6 fade-in">
                    <div className="bg-white p-6 rounded-2xl shadow-sm h-fit">
                        <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} className="w-full p-2 border rounded mb-4 text-xs" placeholder="API Key" />
                        <button onClick={() => setTab('manage')} className={`w-full text-right p-3 rounded font-bold mb-1 ${tab==='manage'?'bg-blue-50 text-blue-600':''}`}><i className="fas fa-tasks"></i> إدارة الدروس</button>
                        <button onClick={() => {setTab('create'); setLesson({title:'',content:'',questions:[],flashcards:[]}); setEditingId(null);}} className={`w-full text-right p-3 rounded font-bold mb-1 ${tab==='create'?'bg-blue-50 text-blue-600':''}`}><i className="fas fa-plus-circle"></i> درس (إضافة/تعديل)</button>
                        <button onClick={() => setTab('bulk')} className={`w-full text-right p-3 rounded font-bold mb-1 ${tab==='bulk'?'bg-purple-50 text-purple-600':''}`}><i className="fas fa-layer-group"></i> المقسم الذكي</button>
                        <button onClick={() => setTab('students')} className={`w-full text-right p-3 rounded font-bold mb-1 ${tab==='students'?'bg-green-50 text-green-600':''}`}><i className="fas fa-users-cog"></i> إدارة الطلاب</button>
                        <button onClick={() => setTab('messages')} className={`w-full text-right p-3 rounded font-bold mb-1 ${tab==='messages'?'bg-orange-50 text-orange-600':''}`}><i className="fas fa-envelope"></i> الرسائل والإعدادات</button>
                    </div>

                    <div className="lg:col-span-3 bg-white p-8 rounded-2xl shadow-sm border">
                        {tab === 'manage' && (
                            <div>
                                <h2 className="text-2xl font-bold mb-6">الدروس الحالية ({lessons.length})</h2>
                                <div className="space-y-3">
                                    {lessons.map(l => (
                                        <div key={l.id} className={`p-4 border rounded-xl flex justify-between items-center ${!l.isVisible ? 'opacity-60 bg-slate-50' : 'bg-white'}`}>
                                            <div><div className="font-bold text-lg">{l.title}</div><div className="text-xs text-slate-400">{l.questions?.length || 0} سؤال • {l.views} مشاهدة</div></div>
                                            <div className="flex gap-2"><button onClick={() => toggleVisibility(l.id)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg"><i className={`fas ${l.isVisible ? 'fa-eye' : 'fa-eye-slash'}`}></i></button><button onClick={() => startEdit(l)} className="p-2 text-blue-500 hover:bg-blue-100 rounded-lg"><i className="fas fa-edit"></i></button><button onClick={() => deleteLesson(l.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><i className="fas fa-trash"></i></button></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'create' && (
                            <>
                                <h2 className="text-2xl font-bold mb-4">{editingId ? 'تعديل الدرس' : 'درس جديد'}</h2>
                                <input className="w-full p-4 border rounded-xl mb-4" placeholder="العنوان" value={lesson.title} onChange={e => setLesson({...lesson, title: e.target.value})} />
                                <textarea className="w-full p-4 bg-slate-50 rounded-xl mb-4 h-48" placeholder="المحتوى..." value={lesson.content} onChange={e => setLesson({...lesson, content: e.target.value})}></textarea>
                                <div className="bg-slate-50 p-4 rounded-xl border mb-4">
                                    <h4 className="font-bold text-sm mb-3 text-slate-600">إعدادات التوليد الذكي:</h4>
                                    <div className="flex gap-4">
                                        <div><label className="text-xs">اختيار من متعدد</label><input type="number" value={genConfig.mcq} onChange={e=>setGenConfig({...genConfig, mcq: e.target.value})} className="w-full p-2 border rounded" /></div>
                                        <div><label className="text-xs">صح/خطأ</label><input type="number" value={genConfig.tf} onChange={e=>setGenConfig({...genConfig, tf: e.target.value})} className="w-full p-2 border rounded" /></div>
                                        <div><label className="text-xs">بطاقات</label><input type="number" value={genConfig.cards} onChange={e=>setGenConfig({...genConfig, cards: e.target.value})} className="w-full p-2 border rounded" /></div>
                                    </div>
                                </div>
                                <div className="flex gap-3 mb-8">
                                    <button onClick={generateSingle} disabled={loading} className="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold flex-1">{loading ? '...' : 'توليد الأسئلة'}</button>
                                    <button onClick={handleSaveLesson} className="bg-primary text-white px-6 py-3 rounded-xl font-bold flex-1">{editingId ? 'حفظ التعديلات' : 'نشر الدرس'}</button>
                                </div>
                                {lesson.questions.length > 0 && (
                                    <div className="border-t pt-6">
                                        <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-lg">تحرير الأسئلة ({lesson.questions.length})</h3><button onClick={addQuestion} className="text-sm bg-green-50 text-green-600 px-3 py-1 rounded-lg border border-green-200">+ سؤال يدوي</button></div>
                                        <div className="space-y-4">
                                            {lesson.questions.map((q, i) => (
                                                <div key={i} className="p-4 border rounded-xl bg-slate-50 relative group">
                                                    <button onClick={() => removeQuestion(i)} className="absolute left-4 top-4 text-red-400 hover:text-red-600"><i className="fas fa-times"></i></button>
                                                    <div className="mb-3 w-11/12"><label className="block text-xs font-bold text-slate-400 mb-1">نص السؤال</label><input className="w-full p-2 border rounded bg-white" value={q.text} onChange={e => updateQ(i, 'text', e.target.value)} /></div>
                                                    {q.type === 'mcq' && ( <div className="mb-3 grid grid-cols-2 gap-2">{q.options.map((opt, optIdx) => (<input key={optIdx} className="p-2 border rounded bg-white text-sm" value={opt} onChange={e => updateOption(i, optIdx, e.target.value)} placeholder={`خيار ${optIdx+1}`} />))}</div> )}
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div><label className="block text-xs font-bold text-slate-400 mb-1">الإجابة الصحيحة</label>{q.type === 'tf' ? (<select className="w-full p-2 border rounded bg-white" value={q.answer} onChange={e => updateQ(i, 'answer', e.target.value)}><option value="true">صح</option><option value="false">خطأ</option></select>) : (<select className="w-full p-2 border rounded bg-white" value={q.answer} onChange={e => updateQ(i, 'answer', e.target.value)}>{q.options.map(o => <option key={o} value={o}>{o}</option>)}</select>)}</div>
                                                        <div><label className="block text-xs font-bold text-slate-400 mb-1">التبرير (الشرح)</label><input className="w-full p-2 border rounded bg-white" value={q.explanation} onChange={e => updateQ(i, 'explanation', e.target.value)} /></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </>
                        )}

                        {tab === 'bulk' && (
                            <>
                                <h2 className="text-2xl font-bold mb-2 text-purple-700">المقسم الذكي</h2>
                                <div className="bg-purple-50 p-4 rounded-xl border border-purple-100 mb-4">
                                    <h4 className="font-bold text-sm mb-3 text-purple-800">إعدادات لكل درس ناتج:</h4>
                                    <div className="flex gap-4">
                                        <div><label className="text-xs font-bold">عدد MCQ</label><input type="number" value={genConfig.mcq} onChange={e=>setGenConfig({...genConfig, mcq: e.target.value})} className="w-full p-2 bg-white border rounded" /></div>
                                        <div><label className="text-xs font-bold">عدد صح/خطأ</label><input type="number" value={genConfig.tf} onChange={e=>setGenConfig({...genConfig, tf: e.target.value})} className="w-full p-2 bg-white border rounded" /></div>
                                        <div><label className="text-xs font-bold">عدد البطاقات</label><input type="number" value={genConfig.cards} onChange={e=>setGenConfig({...genConfig, cards: e.target.value})} className="w-full p-2 bg-white border rounded" /></div>
                                    </div>
                                </div>
                                <textarea className="w-full p-4 bg-slate-50 rounded-xl mb-4 h-64 border" placeholder="الصق النص هنا..." value={bulkText} onChange={e => setBulkText(e.target.value)}></textarea>
                                <button onClick={generateBulk} disabled={loading} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">{loading ? 'جاري العمل...' : 'تقسيم وتوليد الكل'}</button>
                            </>
                        )}
                        
                        {tab === 'students' && (
                             <div>
                                <h2 className="text-2xl font-bold mb-6">إدارة الطلاب ({students.length})</h2>
                                
                                <div className="flex flex-wrap gap-2 mb-6">
                                     <button onClick={exportDataAsCsv} className="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold hover:bg-green-700 shadow flex items-center justify-center gap-2"><i className="fas fa-file-csv"></i> تصدير CSV</button>
                                     <button onClick={deleteAllStudents} className="flex-1 bg-red-600 text-white p-3 rounded-xl font-bold hover:bg-red-700 shadow flex items-center justify-center gap-2"><i className="fas fa-trash-alt"></i> حذف الكل</button>
                                </div>

                                <div className="grid md:grid-cols-2 gap-6 mb-8">
                                    <div className="bg-slate-50 p-4 rounded-xl">
                                        <h3 className="font-bold mb-2">إضافة طالب</h3>
                                        <input className="w-full p-2 mb-2 rounded border" placeholder="الاسم" value={newStd.name} onChange={e => setNewStd({...newStd, name: e.target.value})} />
                                        <input className="w-full p-2 mb-2 rounded border" placeholder="الشعبة" value={newStd.section} onChange={e => setNewStd({...newStd, section: e.target.value})} />
                                        <input className="w-full p-2 mb-2 rounded border" placeholder="السجل المدني" value={newStd.nid} onChange={e => setNewStd({...newStd, nid: e.target.value})} />
                                        <button onClick={() => {if(!newStd.name || !newStd.nid) return alert("البيانات ناقصة"); addStudent(newStd); setNewStd({name: '', section: '', nid: ''});}} className="w-full bg-blue-600 text-white p-2 rounded font-bold">إضافة</button>
                                    </div>
                                    <div className="bg-blue-50 p-4 rounded-xl">
                                        <h3 className="font-bold mb-2">استيراد من Excel (CSV)</h3>
                                        <div className="flex flex-col gap-2">
                                            <input type="file" accept=".csv,.txt" onChange={handleFileImport} className="w-full text-sm mb-1 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200"/>
                                            <p className="text-xs text-slate-500">تم إلغاء الاستيراد باللصق لتخفيف الضغط.</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                                    <input className="p-2 border rounded-lg w-full md:w-64" placeholder="بحث بالاسم أو السجل..." value={studentSearch} onChange={e => {setStudentSearch(e.target.value); setStudentPage(1);}} />
                                    <div className="flex gap-2 w-full md:w-auto">
                                        <select value={studentSort} onChange={(e) => setStudentSort(e.target.value)} className="p-2 border rounded-lg bg-white flex-grow md:flex-grow-0">
                                            <option value="name-asc">الأسم (أبجدياً)</option>
                                            <option value="section-asc">الشعبة</option>
                                            <option value="xp-desc">النقاط (الأعلى)</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setStudentPage(Math.max(1, studentPage-1))} disabled={studentPage===1} className="px-3 py-1 bg-slate-200 rounded disabled:opacity-50"><i className="fas fa-chevron-right"></i></button>
                                        <span className="font-bold px-2">{studentPage} / {totalPages || 1}</span>
                                        <button onClick={() => setStudentPage(Math.min(totalPages, studentPage+1))} disabled={studentPage===totalPages || totalPages===0} className="px-3 py-1 bg-slate-200 rounded disabled:opacity-50"><i className="fas fa-chevron-left"></i></button>
                                    </div>
                                </div>

                                <div className="hidden md:block overflow-x-auto border rounded-xl bg-white">
                                    <table className="w-full text-right text-sm">
