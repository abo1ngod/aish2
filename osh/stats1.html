<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إحصائيات الاختبارات - ثانوية عشيرة</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1a5f7a;
            --primary-dark: #134b5f;
            --primary-light: #2d7d9a;
            --secondary: #c49b3f;
            --secondary-light: #d4af5f;
            --accent: #e8c872;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --gray: #6c757d;
            --bg-gradient: linear-gradient(135deg, #1a5f7a 0%, #134b5f 50%, #0d3d4d 100%);
            --card-bg: rgba(255, 255, 255, 0.97);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--dark);
            overflow-x: hidden;
        }

        /* Background Pattern */
        .bg-pattern {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.07;
            background-image:
                radial-gradient(circle at 20% 80%, var(--secondary) 1px, transparent 1px),
                radial-gradient(circle at 80% 20%, var(--secondary) 1px, transparent 1px),
                radial-gradient(circle at 40% 40%, var(--accent) 0.5px, transparent 0.5px);
            background-size: 100px 100px, 150px 150px, 50px 50px;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== HEADER ===== */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 0 20px;
            flex-wrap: wrap;
            gap: 15px;
            animation: fadeInDown 0.6s ease;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(196, 155, 63, 0.35);
        }

        .header-icon i { font-size: 26px; color: white; }

        .header-titles h1 {
            font-family: 'Amiri', serif;
            font-size: 22px;
            font-weight: 700;
            color: white;
        }

        .header-titles p {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-top: 2px;
        }

        .back-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateX(3px);
        }

        /* ===== KPI CARDS ===== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .kpi-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
        }

        .kpi-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .kpi-icon.blue   { background: rgba(26,95,122,0.12);  color: var(--primary); }
        .kpi-icon.gold   { background: rgba(196,155,63,0.12); color: var(--secondary); }
        .kpi-icon.green  { background: rgba(46,204,113,0.12); color: var(--success); }
        .kpi-icon.orange { background: rgba(243,156,18,0.12); color: var(--warning); }

        .kpi-info { flex: 1; min-width: 0; }

        .kpi-value {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }

        .kpi-label {
            font-size: 13px;
            color: var(--gray);
            margin-top: 4px;
        }

        /* ===== SECTION CARDS ===== */
        .section-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .section-card:last-child { margin-bottom: 40px; }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            flex-wrap: wrap;
            gap: 10px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 17px;
            font-weight: 700;
            color: var(--primary);
        }

        .section-title i {
            width: 34px;
            height: 34px;
            background: rgba(26,95,122,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .section-badge {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(26,95,122,0.1);
            color: var(--primary);
        }

        /* ===== DATA TABLE ===== */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        thead tr {
            background: rgba(26,95,122,0.06);
        }

        th {
            padding: 13px 16px;
            text-align: right;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;
        }

        td {
            padding: 13px 16px;
            text-align: right;
            font-size: 14px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            color: var(--dark);
        }

        tbody tr:hover { background: rgba(26,95,122,0.03); }
        tbody tr:last-child td { border-bottom: none; }

        /* ===== SCORE CHIP ===== */
        .score-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .score-chip.excellent { background: rgba(46,204,113,0.12); color: #27ae60; }
        .score-chip.good      { background: rgba(26,95,122,0.12);  color: var(--primary); }
        .score-chip.average   { background: rgba(243,156,18,0.12); color: #d68910; }
        .score-chip.weak      { background: rgba(231,76,60,0.12);  color: var(--danger); }

        /* ===== AVATAR ===== */
        .student-name-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .avatar.gold {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
        }

        /* ===== RANK BADGE ===== */
        .rank-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .rank-badge.r1 { background: linear-gradient(135deg,#c49b3f,#e8c872); color:white; }
        .rank-badge.r2 { background: linear-gradient(135deg,#9e9e9e,#bdbdbd); color:white; }
        .rank-badge.r3 { background: linear-gradient(135deg,#a0522d,#cd853f); color:white; }
        .rank-badge.rn { background: rgba(108,117,125,0.12); color: var(--gray); }

        /* ===== LOADING ===== */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 16px;
            color: var(--gray);
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(26,95,122,0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .loading-state p { font-size: 15px; }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.4;
            display: block;
        }

        /* ===== REFRESH BTN ===== */
        .refresh-btn {
            background: rgba(26,95,122,0.1);
            color: var(--primary);
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: rgba(26,95,122,0.18);
        }

        .refresh-btn.spinning i { animation: spin 0.9s linear infinite; }

        /* ===== TIMESTAMP ===== */
        .update-time {
            font-size: 12px;
            color: rgba(255,255,255,0.55);
            text-align: center;
            padding-bottom: 10px;
        }

        /* ===== EXAM BADGE ===== */
        .exam-name-badge {
            display: inline-block;
            background: rgba(196,155,63,0.12);
            color: #8a6a00;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ===== COMPLETED STAR ===== */
        .completed-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(46,204,113,0.1);
            color: #27ae60;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .header-titles h1 { font-size: 18px; }
            .kpi-value { font-size: 22px; }
            th, td { padding: 10px 12px; font-size: 13px; }
        }

        /* ===== SORTABLE TH ===== */
        th.sortable {
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        th.sortable:hover { background: rgba(26,95,122,0.1); }
        th.sort-asc::after  { content: ' ↑'; opacity: 0.7; font-size: 11px; }
        th.sort-desc::after { content: ' ↓'; opacity: 0.7; font-size: 11px; }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            flex-wrap: wrap;
        }
        .filter-bar label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray);
        }
        .filter-select {
            border: 1px solid rgba(26,95,122,0.2);
            border-radius: 10px;
            padding: 7px 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            color: var(--dark);
            background: white;
            cursor: pointer;
            outline: none;
            transition: border 0.2s;
        }
        .filter-select:focus { border-color: var(--primary); }
        .filter-count {
            margin-right: auto;
            font-size: 13px;
            color: var(--gray);
        }

        /* ===== SEARCH INPUT ===== */
        .search-input-wrap {
            position: relative;
            flex: 1;
            min-width: 180px;
            max-width: 280px;
        }
        .search-input-wrap i {
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 13px;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            border: 1px solid rgba(26,95,122,0.2);
            border-radius: 10px;
            padding: 7px 32px 7px 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            color: var(--dark);
            background: white;
            outline: none;
            transition: border 0.2s;
        }
        .search-input:focus { border-color: var(--primary); }
        .search-input::placeholder { color: #aaa; }

        /* ===== PAGINATION ===== */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 16px;
            border-top: 1px solid rgba(0,0,0,0.06);
            flex-wrap: wrap;
        }
        .page-btn {
            min-width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid rgba(26,95,122,0.2);
            background: white;
            color: var(--primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
        }
        .page-btn:hover { background: rgba(26,95,122,0.08); }
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .page-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ===== STUDENT LINK ===== */
        .student-link {
            cursor: pointer;
            color: var(--primary);
            text-decoration: underline dotted;
            font-weight: 600;
            transition: color 0.2s;
        }
        .student-link:hover { color: var(--primary-dark); }

        /* ===== COUNT TAG ===== */
        .count-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        .count-tag.all-done { background: rgba(46,204,113,0.12); color: #27ae60; }
        .count-tag.partial  { background: rgba(243,156,18,0.12);  color: #d68910; }
        .count-tag.none     { background: rgba(231,76,60,0.10);   color: var(--danger); }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 680px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: fadeInUp 0.3s ease;
            overflow: hidden;
        }
        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            flex-shrink: 0;
        }
        .modal-head h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-close {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.06);
            cursor: pointer;
            font-size: 16px;
            color: var(--gray);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .modal-close:hover { background: rgba(0,0,0,0.12); }
        .modal-body {
            overflow-y: auto;
            padding: 0;
            flex: 1;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .modal-avg-label { font-size: 14px; color: var(--gray); font-weight: 600; }
        .modal-avg-value { font-size: 22px; font-weight: 800; color: var(--primary); }
        .modal-table { width: 100%; border-collapse: collapse; min-width: 440px; }
        .modal-table th {
            padding: 11px 16px; font-size: 13px; font-weight: 700;
            color: var(--primary); background: rgba(26,95,122,0.05);
            text-align: right; white-space: nowrap;
        }
        .modal-table td {
            padding: 11px 16px; font-size: 13px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            text-align: right;
        }
        .modal-table tbody tr:last-child td { border-bottom: none; }
        .not-done-row { color: var(--gray); font-style: italic; }

        /* ===== REFRESH في الهيدر ===== */
        .refresh-btn-header {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .refresh-btn-header:hover { background: rgba(255,255,255,0.25); }
        .refresh-btn-header.spinning i { animation: spin 0.9s linear infinite; }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="container">

    <!-- Header -->
    <div class="page-header">
        <div class="header-right">
            <div class="header-icon">
                <i class="fas fa-chart-bar"></i>
            </div>
            <div class="header-titles">
                <h1>إحصائيات الاختبارات</h1>
                <p>ثانوية عشيرة — الفصل الدراسي الثاني 2026</p>
            </div>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="refresh-btn-header" id="refreshBtn" onclick="loadData()">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
                العودة للبوابة
            </a>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-grid" id="kpiGrid">
        <div class="kpi-card">
            <div class="kpi-icon blue"><i class="fas fa-users"></i></div>
            <div class="kpi-info">
                <div class="kpi-value" id="kpiStudents">—</div>
                <div class="kpi-label">إجمالي الطلاب</div>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon gold"><i class="fas fa-file-alt"></i></div>
            <div class="kpi-info">
                <div class="kpi-value" id="kpiExams">—</div>
                <div class="kpi-label">اختبارات منشورة</div>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon green"><i class="fas fa-check-circle"></i></div>
            <div class="kpi-info">
                <div class="kpi-value" id="kpiCompleted">—</div>
                <div class="kpi-label">أكملوا جميع الاختبارات</div>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon orange"><i class="fas fa-clock"></i></div>
            <div class="kpi-info">
                <div class="kpi-value" id="kpiSubmissions">—</div>
                <div class="kpi-label">إجمالي التسليمات</div>
            </div>
        </div>
    </div>

    <!-- All Students Table -->
    <div class="section-card">
        <div class="section-header">
            <div class="section-title">
                <i class="fas fa-users"></i>
                جميع الطلاب
            </div>
            <span class="section-badge" id="completedBadge">—</span>
        </div>
        <!-- Filter Bar -->
        <div class="filter-bar" id="studentsFilterBar" style="display:none;">
            <div class="search-input-wrap">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="searchStudent" placeholder="ابحث باسم الطالب..." oninput="applyFilter()">
            </div>
            <label>فرز حسب:</label>
            <select class="filter-select" id="filterGrade" onchange="applyFilter()">
                <option value="all">كل الصفوف</option>
            </select>
            <select class="filter-select" id="filterSection" onchange="applyFilter()">
                <option value="all">كل الشعب</option>
            </select>
            <span class="filter-count" id="filterCount"></span>
        </div>
        <div class="table-wrapper">
            <div id="completedContainer">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>جاري تحميل البيانات...</p>
                </div>
            </div>
        </div>
        <div id="paginationBar" class="pagination" style="display:none;"></div>
    </div>

    <!-- Last 40 Submissions Table -->
    <div class="section-card">
        <div class="section-header">
            <div class="section-title">
                <i class="fas fa-history"></i>
                آخر 40 تسليم اختبار
            </div>
            <span class="section-badge" id="recentBadge">—</span>
        </div>
        <div class="table-wrapper">
            <div id="recentContainer">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>جاري تحميل البيانات...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Update Time -->
    <p class="update-time" id="updateTime"></p>

    <!-- Student Modal -->
    <div class="modal-overlay" id="studentModal" onclick="closeModal(event)">
        <div class="modal-box">
            <div class="modal-head">
                <h3><i class="fas fa-user-graduate" style="font-size:20px;"></i> <span id="modalStudentName"></span></h3>
                <button class="modal-close" onclick="closeModalDirect()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div style="overflow-x:auto; -webkit-overflow-scrolling:touch;">
                    <table class="modal-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>اسم الاختبار</th>
                                <th>الدرجة</th>
                                <th>المدة</th>
                            </tr>
                        </thead>
                        <tbody id="modalTableBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <div>
                    <div class="modal-avg-label">متوسط جميع الاختبارات</div>
                    <div class="modal-avg-value" id="modalAvg">—</div>
                </div>
                <div id="modalMeta" style="font-size:13px; color:var(--gray); text-align:left;"></div>
            </div>
        </div>
    </div>

</div>

<script>
    // ===== Firebase Config =====
    const firebaseConfig = {
        apiKey: "AIzaSyBxPO6RKsQ1Cq-mqlCpFTrCuIyxnYdB37U",
        authDomain: "studentsystem-c1ab1.firebaseapp.com",
        databaseURL: "https://studentsystem-c1ab1-default-rtdb.firebaseio.com",
        projectId: "studentsystem-c1ab1",
        storageBucket: "studentsystem-c1ab1.firebasestorage.app",
        messagingSenderId: "112215023848",
        appId: "1:112215023848:web:0adba326a527ee7e37e95d"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.database();
    const rootRef = db.ref('q2026_2');

    // ===== Helpers =====
    function scoreChipClass(pct) {
        if (pct >= 90) return 'excellent';
        if (pct >= 75) return 'good';
        if (pct >= 60) return 'average';
        return 'weak';
    }

    function formatDateTime(ts) {
        const d = new Date(ts);
        const day   = d.getDate();
        const month = d.getMonth() + 1;
        const hh    = String(d.getHours()).padStart(2, '0');
        const mm    = String(d.getMinutes()).padStart(2, '0');
        return `${day}/${month} - ${hh}:${mm}`;
    }

    function getInitial(name) {
        return name ? name.trim()[0] : '?';
    }

    function rankBadge(i) {
        const cls = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
        return `<div class="rank-badge ${cls}">${i + 1}</div>`;
    }

    // ===== نفس منطق الصفحة الأصلية تماماً =====
    function gradeToNum(grade) {
        if (grade === 'أول ثانوي')  return '1';
        if (grade === 'ثاني ثانوي') return '2';
        return '3';
    }

    function isStudentTargeted(settings, student) {
        if (!settings) return true;
        const targetType = settings.targetType || 'all';
        switch (targetType) {
            case 'all':
                return true;
            case 'grade':
                return student.grade === settings.targetGrade;
            case 'section': {
                const targetSections = settings.targetSections || [];
                if (targetSections.length > 0) {
                    const gradeNum = gradeToNum(student.grade);
                    return targetSections.some(
                        sec => sec.grade === gradeNum && sec.section === student.section
                    );
                }
                return student.grade === settings.targetGrade &&
                       student.section === settings.targetSection;
            }
            case 'specific':
                return (settings.targetStudents || []).includes(student.civilId);
            default:
                return true;
        }
    }

    function getExamsForStudent(publishedExams, student) {
        return Object.entries(publishedExams).filter(([, exam]) =>
            isStudentTargeted(exam.settings, student)
        );
    }

    // ===== Load All Data =====
    async function loadData() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('spinning');

        document.getElementById('completedContainer').innerHTML =
            '<div class="loading-state"><div class="spinner"></div><p>جاري تحميل البيانات...</p></div>';
        document.getElementById('recentContainer').innerHTML =
            '<div class="loading-state"><div class="spinner"></div><p>جاري تحميل البيانات...</p></div>';

        try {
            const [studentsSnap, examsSnap, responsesSnap] = await Promise.all([
                rootRef.child('students').once('value'),
                rootRef.child('exams').once('value'),
                rootRef.child('responses').once('value')
            ]);

            const studentsRaw = studentsSnap.val() || {};
            const examsRaw    = examsSnap.val()    || {};
            const responses   = responsesSnap.val() || {};

            // أضف civilId لكل طالب ليُستخدم في فلتر specific
            const students = {};
            Object.entries(studentsRaw).forEach(([id, s]) => {
                students[id] = { ...s, civilId: id };
            });

            // الاختبارات المنشورة فقط
            const publishedExams = {};
            Object.entries(examsRaw).forEach(([id, exam]) => {
                if (exam.settings?.isPublished) {
                    publishedExams[id] = exam;
                }
            });

            const totalStudents  = Object.keys(students).length;
            const totalPublished = Object.keys(publishedExams).length;

            // ===== قائمة التسليمات - فقط الاختبارات التي تخص الطالب =====
            const allSubmissions = [];
            Object.entries(publishedExams).forEach(([examId, exam]) => {
                const examResponses = responses[examId] || {};
                Object.entries(examResponses).forEach(([studentId, resp]) => {
                    if (!resp.submitted || !resp.submitTime) return;
                    const student = students[studentId];
                    if (!student) return;
                    if (!isStudentTargeted(exam.settings, student)) return;

                    allSubmissions.push({
                        studentId,
                        name      : student.name    || resp.studentName || studentId,
                        grade     : student.grade   || '—',
                        section   : student.section || '—',
                        examId,
                        examTitle : exam.title || examId,
                        score     : resp.score      || 0,
                        total     : resp.totalPoints || 1,
                        submitTime: resp.submitTime
                    });
                });
            });

            const totalSubmissions = allSubmissions.length;

            // ===== من أكمل جميع الاختبارات التي تخصه =====
            const completedList = [];
            Object.entries(students).forEach(([sid, student]) => {
                const myExams = getExamsForStudent(publishedExams, student);
                if (myExams.length === 0) return;

                const doneExams = myExams.filter(([eid]) => {
                    const r = responses[eid]?.[sid];
                    return r && r.submitted;
                });

                if (doneExams.length === myExams.length) {
                    let sumPct = 0;
                    doneExams.forEach(([eid]) => {
                        const r = responses[eid][sid];
                        sumPct += (r.score || 0) / (r.totalPoints || 1) * 100;
                    });
                    completedList.push({
                        name    : student.name    || sid,
                        grade   : student.grade   || '—',
                        section : student.section || '—',
                        count   : doneExams.length,
                        avgPct  : Math.round(sumPct / doneExams.length)
                    });
                }
            });

            completedList.sort((a, b) => b.avgPct - a.avgPct);

            // ===== KPIs =====
            // ===== بناء allStudentsData الشاملة =====
            allStudentsData = [];
            let completedCount = 0;
            Object.entries(students).forEach(([sid, student]) => {
                const myExams = getExamsForStudent(publishedExams, student);
                const examDetails = myExams.map(([eid, exam]) => {
                    const r = responses[eid]?.[sid];
                    const done = !!(r && r.submitted);
                    return {
                        examId    : eid,
                        examTitle : exam.title || eid,
                        done,
                        score     : done ? (r.score      || 0) : null,
                        total     : done ? (r.totalPoints || 1) : null,
                        startTime : done ? (r.startTime   || null) : null,
                        submitTime: done ? (r.submitTime  || null) : null,
                    };
                });
                const doneCount  = examDetails.filter(e => e.done).length;
                const totalCount = examDetails.length;
                const allDone    = totalCount > 0 && doneCount === totalCount;
                if (allDone) completedCount++;

                // متوسط الدرجة على الاختبارات المنجزة فقط
                const doneList = examDetails.filter(e => e.done);
                const avgPct   = totalCount > 0
                    ? Math.round(doneList.reduce((s, e) => s + (e.score / e.total * 100), 0) / totalCount)
                    : 0;

                allStudentsData.push({
                    sid, name: student.name || sid,
                    grade: student.grade || '—', section: student.section || '—',
                    examDetails, doneCount, totalCount, allDone, avgPct
                });
            });

            document.getElementById('kpiStudents').textContent    = totalStudents;
                        document.getElementById('kpiStudents').textContent    = totalStudents;
            document.getElementById('kpiExams').textContent       = totalPublished;
            document.getElementById('kpiCompleted').textContent   = completedCount;
            document.getElementById('kpiSubmissions').textContent = totalSubmissions;
            document.getElementById('completedBadge').textContent = `${totalStudents} طالب`;

            // تعبئة قوائم الفلتر
            populateFilters();
            // عرض الجدول
            currentPage = 1;
            currentSort = { col: 'name', dir: 'asc' };
            applyFilter();

            const last40 = allSubmissions
                .sort((a, b) => b.submitTime - a.submitTime)
                .slice(0, 40);

            document.getElementById('recentBadge').textContent = `${last40.length} تسليم`;
            renderRecentTable(last40);

            document.getElementById('updateTime').textContent =
                `آخر تحديث: ${formatDateTime(Date.now())}`;

        } catch (err) {
            console.error(err);
            document.getElementById('completedContainer').innerHTML =
                '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>حدث خطأ في تحميل البيانات</p></div>';
            document.getElementById('recentContainer').innerHTML =
                '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>حدث خطأ في تحميل البيانات</p></div>';
        }

        btn.classList.remove('spinning');
    }

    // ===== State =====
    let allStudentsData = [];
    let filteredStudents = [];
    let currentPage = 1;
    let currentSort = { col: 'name', dir: 'asc' };
    const PAGE_SIZE = 40;

    // ===== تعبئة قوائم الفلتر =====
    function populateFilters() {
        const grades    = [...new Set(allStudentsData.map(s => s.grade))].sort();
        const sections  = [...new Set(allStudentsData.map(s => s.section))].sort();
        const gSel = document.getElementById('filterGrade');
        const sSel = document.getElementById('filterSection');
        gSel.innerHTML = '<option value="all">كل الصفوف</option>' +
            grades.map(g => `<option value="${g}">${g}</option>`).join('');
        sSel.innerHTML = '<option value="all">كل الشعب</option>' +
            sections.map(s => `<option value="${s}">شعبة ${s}</option>`).join('');
        document.getElementById('studentsFilterBar').style.display = 'flex';
    }

    // ===== فرز =====
    function sortStudents(list) {
        return [...list].sort((a, b) => {
            let va, vb;
            switch (currentSort.col) {
                case 'name'    : va = a.name;    vb = b.name;    break;
                case 'grade'   : va = a.grade;   vb = b.grade;   break;
                case 'section' : va = a.section; vb = b.section; break;
                case 'done'    : va = a.doneCount;  vb = b.doneCount;  break;
                case 'avg'     : va = a.avgPct;  vb = b.avgPct;  break;
                default        : va = a.name;    vb = b.name;
            }
            if (typeof va === 'string') va = va.localeCompare(vb, 'ar');
            else va = va - vb;
            return currentSort.dir === 'asc' ? va : -va;
        });
    }

    // ===== تطبيق الفلتر =====
    function applyFilter() {
        const grade   = document.getElementById('filterGrade').value;
        const section = document.getElementById('filterSection').value;
        const query   = document.getElementById('searchStudent').value.trim().toLowerCase();
        filteredStudents = allStudentsData.filter(s =>
            (grade   === 'all' || s.grade   === grade) &&
            (section === 'all' || s.section === section) &&
            (!query || s.name.toLowerCase().includes(query))
        );
        currentPage = 1;
        renderStudentsTable();
    }

    // ===== تبديل الترتيب =====
    function toggleSort(col) {
        if (currentSort.col === col) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
        else { currentSort.col = col; currentSort.dir = 'asc'; }
        renderStudentsTable();
    }

    // ===== عرض الجدول الرئيسي =====
    function renderStudentsTable() {
        const container = document.getElementById('completedContainer');
        const paginationBar = document.getElementById('paginationBar');

        if (filteredStudents.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>لا يوجد طلاب</p></div>';
            paginationBar.style.display = 'none';
            document.getElementById('filterCount').textContent = '';
            return;
        }

        const sorted  = sortStudents(filteredStudents);
        const total   = sorted.length;
        const pages   = Math.ceil(total / PAGE_SIZE);
        currentPage   = Math.min(currentPage, pages);
        const start   = (currentPage - 1) * PAGE_SIZE;
        const pageData = sorted.slice(start, start + PAGE_SIZE);

        document.getElementById('filterCount').textContent = `${total} طالب`;

        const thClass = col => {
            let cls = 'sortable';
            if (currentSort.col === col) cls += currentSort.dir === 'asc' ? ' sort-asc' : ' sort-desc';
            return cls;
        };

        let rows = '';
        pageData.forEach((s, i) => {
            const num = start + i + 1;
            const cls = s.avgPct > 0 ? scoreChipClass(s.avgPct) : 'weak';
            const tagCls = s.allDone ? 'all-done' : s.doneCount > 0 ? 'partial' : 'none';
            const tagIcon = s.allDone ? 'fa-check-circle' : s.doneCount > 0 ? 'fa-adjust' : 'fa-times-circle';
            const avgText = s.doneCount > 0 ? `<span class="score-chip ${cls}">${s.avgPct}%</span>` : '<span style="color:var(--gray);font-size:13px;">—</span>';
            rows += `
                <tr>
                    <td style="color:var(--gray);font-size:12px;">${num}</td>
                    <td>
                        <div class="student-name-cell">
                            <div class="avatar">${getInitial(s.name)}</div>
                            <span class="student-link" onclick="openStudentModal('${s.sid}')">${s.name}</span>
                        </div>
                    </td>
                    <td>${s.grade}</td>
                    <td>شعبة ${s.section}</td>
                    <td>
                        <span class="count-tag ${tagCls}">
                            <i class="fas ${tagIcon}"></i> ${s.doneCount} / ${s.totalCount}
                        </span>
                    </td>
                    <td>${avgText}</td>
                </tr>`;
        });

        container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th style="width:40px;">#</th>
                        <th class="${thClass('name')}" onclick="toggleSort('name')">اسم الطالب</th>
                        <th class="${thClass('grade')}" onclick="toggleSort('grade')">الصف</th>
                        <th class="${thClass('section')}" onclick="toggleSort('section')">الشعبة</th>
                        <th class="${thClass('done')}" onclick="toggleSort('done')">الاختبارات المنجزة</th>
                        <th class="${thClass('avg')}" onclick="toggleSort('avg')">متوسط الدرجة</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;

        // Pagination
        if (pages <= 1) {
            paginationBar.style.display = 'none';
        } else {
            paginationBar.style.display = 'flex';
            let btns = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
            for (let p = 1; p <= pages; p++) {
                if (pages > 7 && Math.abs(p - currentPage) > 2 && p !== 1 && p !== pages) {
                    if (p === 2 || p === pages - 1) btns += `<span style="padding:0 4px;color:var(--gray);">…</span>`;
                    continue;
                }
                btns += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
            }
            btns += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
            paginationBar.innerHTML = btns;
        }
    }

    function goPage(p) {
        currentPage = p;
        renderStudentsTable();
        document.querySelector('.section-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ===== النافذة المنبثقة =====
    function formatDuration(startTime, submitTime) {
        if (!startTime || !submitTime) return '—';
        const diff = Math.round((submitTime - startTime) / 1000);
        if (diff < 0) return '—';
        const m = Math.floor(diff / 60);
        const s = diff % 60;
        return m > 0 ? `${m} د ${s} ث` : `${s} ث`;
    }

    function openStudentModal(sid) {
        const s = allStudentsData.find(x => x.sid === sid);
        if (!s) return;
        document.getElementById('modalStudentName').textContent = s.name;
        document.getElementById('modalMeta').textContent = `${s.grade} — شعبة ${s.section}`;

        let rows = '';
        s.examDetails.forEach((e, i) => {
            if (e.done) {
                const pct = Math.round(e.score / e.total * 100);
                const cls = scoreChipClass(pct);
                const dur = formatDuration(e.startTime, e.submitTime);
                rows += `<tr>
                    <td style="color:var(--gray);font-size:12px;">${i+1}</td>
                    <td style="font-weight:600;">${e.examTitle}</td>
                    <td><span class="score-chip ${cls}">${e.score}/${e.total} (${pct}%)</span></td>
                    <td style="color:var(--gray);font-size:13px;">${dur}</td>
                </tr>`;
            } else {
                rows += `<tr class="not-done-row">
                    <td style="font-size:12px;">${i+1}</td>
                    <td>${e.examTitle}</td>
                    <td colspan="2" style="color:var(--danger);font-size:12px;"><i class="fas fa-minus-circle"></i> لم يُنجز</td>
                </tr>`;
            }
        });

        document.getElementById('modalTableBody').innerHTML = rows || '<tr><td colspan="4" style="text-align:center;color:var(--gray);padding:30px;">لا توجد اختبارات مخصصة</td></tr>';

        if (s.doneCount > 0) {
            const cls = scoreChipClass(s.avgPct);
            document.getElementById('modalAvg').innerHTML = `<span class="score-chip ${cls}" style="font-size:18px;padding:6px 16px;">${s.avgPct}%</span>`;
        } else {
            document.getElementById('modalAvg').textContent = '—';
        }

        document.getElementById('studentModal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal(e) {
        if (e.target === document.getElementById('studentModal')) closeModalDirect();
    }
    function closeModalDirect() {
        document.getElementById('studentModal').classList.remove('open');
        document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

    // ===== Render Recent =====
    function renderRecentTable(list) {
        const container = document.getElementById('recentContainer');

        if (list.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>لا توجد تسليمات بعد</p>
                </div>`;
            return;
        }

        let rows = '';
        list.forEach((s, i) => {
            const pct = Math.round((s.score / s.total) * 100);
            const cls = scoreChipClass(pct);
            rows += `
                <tr>
                    <td style="color:var(--gray); font-size:13px;">${i + 1}</td>
                    <td>
                        <div class="student-name-cell">
                            <div class="avatar">${getInitial(s.name)}</div>
                            <span>${s.name}</span>
                        </div>
                    </td>
                    <td>${s.grade}</td>
                    <td>شعبة ${s.section}</td>
                    <td><span class="exam-name-badge" title="${s.examTitle}">${s.examTitle}</span></td>
                    <td>
                        <span class="score-chip ${cls}">${s.score}/${s.total} (${pct}%)</span>
                    </td>
                    <td style="color:var(--gray); font-size:13px; white-space:nowrap;">${formatDateTime(s.submitTime)}</td>
                </tr>`;
        });

        container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>اسم الطالب</th>
                        <th>الصف</th>
                        <th>الشعبة</th>
                        <th>الاختبار</th>
                        <th>الدرجة</th>
                        <th>وقت التسليم</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    // ===== Init =====
    loadData();
</script>
</body>
</html>
